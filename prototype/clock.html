<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时薪桌面钟</title>
<meta name="theme-color" content="#08080c">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⏱</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<link rel="stylesheet" href="target-cursor.css">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
canvas { position:fixed;inset:0;z-index:0;pointer-events:none;display:block; }
body {
  background:#08080c;color:#ededef;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
main {
  position:relative;z-index:1;text-align:center;
  width:clamp(320px,82vw,620px);padding:2rem 1rem;
}

/* Status pill */
.pill {
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;
  font-size:9px;font-weight:600;letter-spacing:0.8px;margin-bottom:20px;text-transform:uppercase;
}
.pill .dot { width:4px;height:4px;border-radius:50%; }
.pill.before { background:rgba(113,113,122,0.08);color:#a1a1aa; } .pill.before .dot { background:#a1a1aa; }
.pill.working { background:rgba(52,211,153,0.08);color:#34d399; } .pill.working .dot { background:#34d399;animation:breathe 1.5s infinite; }
.pill.after { background:rgba(251,191,36,0.08);color:#fbbf24; } .pill.after .dot { background:#fbbf24; }
.pill.overtime { background:rgba(248,113,113,0.12);color:#f87171; } .pill.overtime .dot { background:#f87171;animation:breathe 0.8s infinite; }
.pill.rest { background:rgba(113,113,122,0.08);color:#a1a1aa; } .pill.rest .dot { background:#a1a1aa; }
.pill.paused { background:rgba(96,165,250,0.08);color:#60a5fa; } .pill.paused .dot { background:#60a5fa; }
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.8)} }

/* Message */
.msg { min-height:28px;margin-bottom:8px; }
.msg .l1 { font-size:12px;color:#6b6b75;letter-spacing:0.5px; }
.msg .l2 { font-size:18px;font-family:'Courier New',monospace;color:#a1a1aa;letter-spacing:2px; }

/* Breakdown */
.bd { display:none;font-size:10px;color:#5c5c66;margin-bottom:6px;letter-spacing:0.5px; }
.overtime .bd { display:block; }
.bd span { margin:0 6px;font-family:'Courier New',monospace;color:#a1a1aa; }

/* Amount */
.amt { margin-bottom:16px; }
.amt .num-row { display:flex;align-items:baseline;justify-content:center;gap:4px; }
.amt .sym {
  font-size:clamp(22px,3.5vw,36px);font-weight:300;color:#6b6b75;
  transition:color 0.5s;align-self:flex-start;margin-top:clamp(8px,1.5vw,16px);
}
.amt .num {
  font-size:clamp(72px,13vw,136px);font-weight:700;letter-spacing:-4px;line-height:0.9;
  font-family:-apple-system,BlinkMacSystemFont,"SF Mono","Courier New",monospace;
  transition:color 0.5s;font-variant-numeric:tabular-nums;
}
.working .sym,.working .num { color:#f59e0b; }
.after .sym,.after .num { color:#f59e0b; }
.overtime .sym,.overtime .num { color:#f59e0b; }
.rest .sym,.rest .num { color:#6b6b75; }
.paused .sym,.paused .num { color:#60a5fa; }

.amt .lbl {
  font-size:11px;color:#6b6b75;margin-top:8px;transition:color 0.5s;
  letter-spacing:1px;text-transform:uppercase;
}
.working .amt .lbl { color:#92400e; }
.after .amt .lbl { color:#92400e; }
.overtime .amt .lbl { color:#b91c1c; }
.paused .amt .lbl { color:#3b82f6; }

/* Actions row */
.actions { display:none;margin-top:48px; }
.working .actions,.paused .actions,.after .actions,.overtime .actions { display:block; }
.actions .btns { display:flex;gap:8px;justify-content:center;flex-wrap:wrap; }
.actions .btns button {
  padding:6px 18px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:0.2s;border:1px solid;letter-spacing:0.5px;
  background:transparent;
}
/* Pause — large bottom button */
.actions .pause,.actions .resume {
  padding:14px 56px;font-size:20px;letter-spacing:1.5px;border-radius:28px;min-width:180px;
}
.actions .pause { border-color:rgba(96,165,250,0.25);color:#60a5fa; }
.actions .pause:hover { background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.5); }
.actions .resume { border-color:rgba(52,211,153,0.25);color:#34d399; }
.actions .resume:hover { background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.5); }
/* OT */
.actions .ot-start { border-color:rgba(245,158,11,0.2);color:#f59e0b; }
.actions .ot-start:hover { background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.4); }
.actions .ot-stop { border-color:rgba(239,68,68,0.2);color:#f87171; }
.actions .ot-stop:hover { background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.4); }

/* OT rate label */
.ot-rate { display:none;font-size:9px;color:#b45309;margin-bottom:6px;letter-spacing:0.5px; }
.after .ot-rate,.overtime .ot-rate { display:block; }
</style>
</head>
<body class="before">
<canvas id="bg"></canvas>
<main id="clock">
  <div class="pill before" id="pill"><span class="dot"></span><span id="st">waiting</span></div>

  <div class="msg"><div class="l1" id="ml1"></div><div class="l2" id="ml2"></div></div>

  <div class="bd" id="bd">base <span id="bdBase">0</span> + ot <span id="bdOT">0</span></div>

  <div class="amt">
    <div class="num-row">
      <span class="sym">¥</span><span class="num" id="amount">0.00</span>
    </div>
    <div class="lbl" id="lbl">today</div>
  </div>

  <div class="ot-rate" id="otLabel"></div>

  <div class="actions" id="actions">
    <div class="btns">
      <button class="pause cursor-target" id="pauseBtn" onclick="pauseWork()">⏸ pause</button>
      <button class="resume cursor-target" id="resumeBtn" onclick="resumeWork()" style="display:none">▶ resume</button>
      <button class="ot-start cursor-target" id="otStart" onclick="startOT()">start overtime</button>
      <button class="ot-stop cursor-target" id="otStop" onclick="stopOT()" style="display:none">stop overtime</button>
    </div>
  </div>
</main>

<script src="nav.js"></script>
<script src="currency.js"></script>
<script src="i18n.js"></script>
<script src="target-cursor.js"></script>
<script>
// Auth
var CU=sessionStorage.getItem('wageClock_currentUser');
if(!CU) location.href='hero.html';
function uk(k){return'wageClock_'+CU+'_'+k;}
function ld(k,d){try{var v=localStorage.getItem(uk(k));return v?JSON.parse(v):d;}catch(e){return d;}}
function sd(k,v){localStorage.setItem(uk(k),JSON.stringify(v));}
function go(u){location.href=u;}
function logout(){sessionStorage.removeItem('wageClock_currentUser');localStorage.removeItem('wageClock_rememberedUser');location.href='login.html';}

// Settings
var S=ld('settings',{
  monthlySalary:15000,workingDays:22,workStart:'09:00',workEnd:'18:00',
  dailySalary:15000/22,workHours:9,perSecondRate:(15000/22)/9/3600,
  workDaysOfWeek:[true,true,true,true,true,false,false],
  scheduleType:'dual',satWorkThisWeek:false,
  overtimeSettings:{mode:'rate',multiplier:1.5,customAmount:50,customUnit:'hour'}
});
if(!S.overtimeSettings)S.overtimeSettings={mode:'rate',multiplier:1.5,customAmount:50,customUnit:'hour'};

// Holidays
var HD={'2026-01-01':'New Year','2026-04-05':'Qingming','2026-05-01':'Labor Day','2026-05-31':'Dragon Boat','2026-09-25':'Mid-Autumn','2026-10-01':'National Day'};
var MW=['2026-02-14','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];

// State
var state='before',raf=null,acc=0,base=0,otAmt=0,cd=0,otStartT=null;
function _(s){ return typeof t==='function' ? t(s) : s; }

// ── Notifications ──────────────────────────────────────
var notifPerm = 'default';
var notifTimers = [];

function reqNotifPerm(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted'){ notifPerm = 'granted'; return; }
  if(Notification.permission === 'denied'){ notifPerm = 'denied'; return; }
  Notification.requestPermission().then(function(p){ notifPerm = p; });
}

function clearNotifTimers(){
  notifTimers.forEach(function(t){ clearTimeout(t); });
  notifTimers = [];
}

function scheduleNotif(time, title, body){
  if(notifPerm !== 'granted') return;
  var now = new Date();
  var target = new Date(now);
  target.setHours(time[0], time[1], 0, 0);
  var ms = target - now;
  if(ms <= 0) return;
  var timer = setTimeout(function(){
    new Notification(title, { body: body, tag: 'wageclock' });
  }, ms);
  notifTimers.push(timer);
}

function scheduleDayNotifs(){
  if(!S || !S.workStart || !S.workEnd) return;
  clearNotifTimers();
  var s = S.workStart.split(':').map(Number);
  var e = S.workEnd.split(':').map(Number);
  scheduleNotif(s, _('earning · live'), _('work starts now'));
  scheduleNotif(e, _('today · done'), _('work day complete'));
}

function gWS(){var p=S.workStart.split(':').map(Number);var d=new Date();d.setHours(p[0],p[1],0,0);return d;}
function gWE(){var p=S.workEnd.split(':').map(Number);var d=new Date();d.setHours(p[0],p[1],0,0);return d;}
function gWSecs(){return(gWE()-gWS())/1000;}
function otRate(){
  var o=S.overtimeSettings;
  if(o.mode==='persecond')return S.perSecondRate;
  if(o.mode==='custom'){if(o.customUnit==='once')return 0;if(o.customUnit==='hour')return(o.customAmount||0)/3600;return o.customAmount||0;}
  return S.perSecondRate*(o.multiplier||1.5);
}
function otLabel(){
  var o=S.overtimeSettings;
  if(o.mode==='persecond')return'1x rate';
  if(o.mode==='custom'){if(o.customUnit==='once')return'flat '+(o.customAmount||0);if(o.customUnit==='hour')return(o.customAmount||0)+'/hr';return(o.customAmount||0)+'/sec';}
  return (o.multiplier||1.5)+'x OT';
}

function isRest(){
  var t=new Date(),ds=t.toISOString().slice(0,10),dow=t.getDay();
  if(MW.indexOf(ds)>=0)return false;
  if(HD[ds])return{rest:true,reason:HD[ds],type:'holiday'};
  var idx=dow===0?6:dow-1;
  if(!S.workDaysOfWeek[idx])return{rest:true,reason:'weekend',type:'weekend'};
  return false;
}

function setState(s){
  state=s;if(raf){cancelAnimationFrame(raf);raf=null;}
  var c=document.getElementById('clock');c.className=s;
  if(s==='rest')showRest();else if(s==='before')showBefore();
  else if(s==='working')showWorking();else if(s==='after')showAfter();
  else if(s==='paused')showPaused();else if(s==='overtime')startOT();
}

function updatePill(s){
  var p=document.getElementById('pill');p.className='pill '+s;
}
function showRest(){
  updatePill('rest');document.getElementById('st').textContent=_('day off');
  document.getElementById('ml1').textContent=_('rest day');document.getElementById('ml2').textContent='';
  document.getElementById('amount').textContent='0.00';document.getElementById('lbl').textContent=_('paused');
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='none';
  document.getElementById('bd').style.display='none';
}
function showBefore(){
  updatePill('before');document.getElementById('st').textContent=_('waiting');
  document.getElementById('ml1').textContent=_('work starts in');
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='none';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='none';
  document.getElementById('bd').style.display='none';acc=0;base=0;otAmt=0;
  var now=new Date(),start=gWS();if(now>=start)start.setDate(start.getDate()+1);
  cd=Math.floor((start-now)/1000);if(cd<0)cd=5535;
  updateCD();animCD();
  document.getElementById('amount').textContent='0.00';document.getElementById('lbl').textContent=_('today');
  
}
function showWorking(){
  updatePill('working');document.getElementById('st').textContent=_('earning');
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='none';
  document.getElementById('bd').style.display='none';
  document.getElementById('pauseBtn').style.display='inline-block';
  document.getElementById('resumeBtn').style.display='none';
  var now=new Date(),start=gWS(),end=gWE();
  var elapsed=Math.max(0,(now-start)/1000),total=gWSecs();
  base=Math.min(elapsed,Math.max(0,total))*S.perSecondRate;otAmt=0;acc=base;
  var eh=Math.floor(elapsed/3600),em=Math.floor((elapsed%3600)/60);
  document.getElementById('ml1').textContent=eh+'h '+em+'m worked today';document.getElementById('ml2').textContent='';
  setTimeout(function(){document.getElementById('ml1').textContent='';},4000);
  updateDisp();animWork();
  document.getElementById('lbl').textContent=_('earning · live');
}
function showPaused(){
  updatePill('paused');document.getElementById('st').textContent=_('paused');
  document.getElementById('ml1').textContent=_('work paused');document.getElementById('ml2').textContent='';
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='none';
  document.getElementById('bd').style.display='none';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='inline-block';
  updateDisp();document.getElementById('lbl').textContent=_('today · paused');
}
function pauseWork(){
  if(state!=='working')return;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  setState('paused');
}
function resumeWork(){
  if(state!=='paused')return;
  state='working';
  document.getElementById('clock').className='working';
  updatePill('working');document.getElementById('st').textContent=_('earning');
  document.getElementById('pauseBtn').style.display='inline-block';
  document.getElementById('resumeBtn').style.display='none';
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='none';
  document.getElementById('lbl').textContent=_('earning · live');
  document.getElementById('ml1').textContent='';
  animWork();
}
function showAfter(){
  updatePill('after');document.getElementById('st').textContent=_('done');
  document.getElementById('ml1').textContent='';document.getElementById('ml2').textContent='';
  document.getElementById('bd').style.display='none';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='none';
  base=S.dailySalary;otAmt=0;acc=base;
  document.getElementById('amount').textContent=acc.toFixed(2);
  document.getElementById('lbl').textContent=_('today · completed');
  document.getElementById('otStart').style.display='inline-block';
  document.getElementById('otStop').style.display='none';
  document.getElementById('otLabel').textContent='OT: '+otLabel();
  sd('earnings_'+new Date().toISOString().slice(0,10),base);
}
function startOT(){
  updatePill('overtime');document.getElementById('st').textContent=_('overtime');
  document.getElementById('ml1').textContent='';document.getElementById('ml2').textContent='';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='none';
  if(base<S.dailySalary)base=S.dailySalary;
  if(!otStartT)otStartT=new Date();
  acc=base+otAmt;updateDisp();updateBD();
  document.getElementById('bd').style.display='block';
  document.getElementById('lbl').textContent=_('base + ot · live');
  document.getElementById('otStart').style.display='none';
  document.getElementById('otStop').style.display='inline-block';
  document.getElementById('otLabel').textContent='OT: '+otLabel();
  if(raf)cancelAnimationFrame(raf);
  animOT();document.getElementById('clock').className='overtime';state='overtime';
}
function stopOT(){
  if(otStartT){otAmt+=(new Date()-otStartT)/1000*otRate();}
  otStartT=null;acc=base+otAmt;
  document.getElementById('amount').textContent=acc.toFixed(2);
  document.getElementById('lbl').textContent=_('total · completed');
  updateBD();document.getElementById('bd').style.display='block';
  document.getElementById('otStart').style.display='inline-block';
  document.getElementById('otStart').textContent=_('resume overtime');
  document.getElementById('otStop').style.display='none';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  sd('earnings_'+new Date().toISOString().slice(0,10),acc);
}

// Animations
function animCD(){
  var t=function(){cd--;
    if(cd<=0){setState('working');return;}
    updateCD();raf=requestAnimationFrame(function(){setTimeout(t,1000);});};
  raf=requestAnimationFrame(function(){setTimeout(t,1000);});
}
function updateCD(){
  var h=Math.floor(cd/3600),m=Math.floor((cd%3600)/60),s=cd%60;
  document.getElementById('ml2').textContent=[h,m,s].map(function(x){return String(x).padStart(2,'0');}).join(':');
}
function animWork(){
  var lt=Date.now();
  var t=function(){
    var now=Date.now(),delta=(now-lt)/1000;lt=now;
    var rem=S.dailySalary-base;
    if(rem>0.001){var add=Math.min(delta*S.perSecondRate,rem);base+=add;}
    acc=base+otAmt;updateDisp();
    if(base>=S.dailySalary-0.001){setState('after');return;}
    raf=requestAnimationFrame(t);
  };
  raf=requestAnimationFrame(t);
}
function animOT(){
  var lt=Date.now();otStartT=new Date();
  var t=function(){
    var now=Date.now();otAmt+=(now-lt)/1000*otRate();lt=now;
    acc=base+otAmt;updateDisp();updateBD();
    raf=requestAnimationFrame(t);
  };
  raf=requestAnimationFrame(t);
}
function updateDisp(){document.getElementById('amount').textContent=acc.toFixed(2);}
function updateBD(){
  document.getElementById('bdBase').textContent=formatMoney(base,2);
  document.getElementById('bdOT').textContent=formatMoney(otAmt,2);
}

// Init
(function(){
  reqNotifPerm();
  var r=isRest();
  if(r){setState('rest');return;}
  var now=new Date(),start=gWS(),end=gWE();
  if(now<start){setState('before');scheduleDayNotifs();}
  else if(now>end)setState('after');
  else setState('working');
})();

// DotGrid
(function(){
  var cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  var DS=3,G=28,P=120,RS=0.08,FR=0.88,W=0,H=0,dots=[];
  var pt={x:-999,y:-999,px:0,py:0,vx:0,vy:0};
  function build(){
    var r=cv.parentNode.getBoundingClientRect();W=r.width;H=r.height;
    var dpr=devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
    var cell=DS+G,cols=Math.floor(W/cell),rows=Math.floor(H/cell);
    var gW=cell*cols,gH=cell*rows,ox=(W-gW)/2+DS/2,oy=(H-gH)/2+DS/2;
    dots=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)dots.push({cx:ox+c*cell,cy:oy+r*cell,x:0,y:0,vx:0,vy:0});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);var psq=P*P;
    for(var i=0;i<dots.length;i++){
      var d=dots[i],ox=d.cx+d.x,oy=d.cy+d.y,dx=d.cx-pt.x,dy=d.cy-pt.y,dsq=dx*dx+dy*dy;
      var a=0.1;if(dsq<psq){var t=1-Math.sqrt(dsq)/P;a=0.1+t*0.45;}
      ctx.beginPath();ctx.arc(ox,oy,DS/2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.fill();
    }
  }
  function upd(){
    pt.vx+=(pt.x-pt.px-pt.vx)*0.3;pt.vy+=(pt.y-pt.py-pt.vy)*0.3;pt.px=pt.x;pt.py=pt.y;
    var spd=Math.hypot(pt.vx,pt.vy);
    for(var i=0;i<dots.length;i++){
      var d=dots[i],dx=d.cx-pt.x,dy=d.cy-pt.y,dist=Math.hypot(dx,dy);
      if(dist<P&&spd>5){var f=(1-dist/P)*spd*0.015;d.vx+=(dx/dist)*f;d.vy+=(dy/dist)*f;}
      d.vx+=(0-d.x)*RS;d.vy+=(0-d.y)*RS;d.vx*=FR;d.vy*=FR;d.x+=d.vx;d.y+=d.vy;
    }
  }
  function tick(){upd();draw();requestAnimationFrame(tick);}
  function mv(e){var r=cv.getBoundingClientRect();pt.x=e.clientX-r.left;pt.y=e.clientY-r.top;}
  function cl(e){var r=cv.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
    for(var i=0;i<dots.length;i++){var d=dots[i],dist=Math.hypot(d.cx-cx,d.cy-cy);
    if(dist<200){var f=(1-dist/200)*12;d.vx+=(d.cx-cx)/dist*f;d.vy+=(d.cy-cy)/dist*f;}}}
  setTimeout(function(){build();requestAnimationFrame(tick);},100);
  window.addEventListener('resize',build);window.addEventListener('mousemove',mv,{passive:true});window.addEventListener('click',cl);
})();

// Init PillNav
initPillNav({ active: 'clock' });
initTargetCursor();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

</script>
</body>
</html>
