<!--
📐 交互原型 - 非正式产品
时薪桌面钟 · v3.0 修复回溯计算 + 新增加班模式
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟 · 时钟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0b1120; --card: #111827; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: #e2e8f0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }
        .clock-container {
            width: 420px; min-height: 580px; background: var(--card);
            border: 1px solid var(--border); border-radius: 24px; padding: 32px 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clock-container.state-rest     { box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(139,92,246,0.10); }
        .clock-container.state-before   { box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(100,116,139,0.08); }
        .clock-container.state-working  { box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(16,185,129,0.12); }
        .clock-container.state-after    { box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(245,158,11,0.12); }
        .clock-container.state-overtime { box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(239,68,68,0.18); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar .title { font-size: 14px; font-weight: 600; color: #94a3b8; letter-spacing: 0.5px; }
        .top-bar .settings-btn {
            width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: all 0.2s; color: #94a3b8;
        }
        .top-bar .settings-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; transition: all 0.5s;
        }
        .state-rest .status-badge     { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .state-before .status-badge   { background: rgba(100,116,139,0.15); color: #94a3b8; }
        .state-working .status-badge  { background: rgba(16,185,129,0.15); color: #34d399; }
        .state-after .status-badge    { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .state-overtime .status-badge { background: rgba(239,68,68,0.15); color: #f87171; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; transition: all 0.5s; }
        .state-rest .status-dot     { background: #a78bfa; }
        .state-before .status-dot   { background: #94a3b8; }
        .state-working .status-dot  { background: #34d399; animation: pulse-dot 1.5s ease-in-out infinite; }
        .state-after .status-dot    { background: #fbbf24; }
        .state-overtime .status-dot { background: #f87171; animation: pulse-dot 0.8s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.6)} }

        .message-section { text-align: center; margin-bottom: 10px; min-height: 36px; transition: all 0.5s; }
        .message-line1 { font-size: 13px; color: #64748b; margin-bottom: 4px; }
        .message-line2 { font-size: 22px; font-weight: 300; color: #94a3b8; letter-spacing: 1px; font-family: "SF Mono", "Fira Code", "Consolas", monospace; }
        .state-rest .message-line1 { color: #7c3aed; }
        .state-rest .message-line2 { color: #a78bfa; }

        .holiday-icon { font-size: 48px; margin-bottom: 8px; display: none; }
        .state-rest .holiday-icon { display: block; }

        .amount-section { text-align: center; margin-bottom: 6px; }
        .currency-symbol { font-size: 28px; font-weight: 300; vertical-align: top; display: inline-block; margin-right: 2px; margin-top: 6px; transition: color 0.5s; }
        .state-rest .currency-symbol     { color: #7c3aed; }
        .state-before .currency-symbol   { color: #475569; }
        .state-working .currency-symbol  { color: #6ee7b7; }
        .state-after .currency-symbol    { color: #fcd34d; }
        .state-overtime .currency-symbol { color: #fca5a5; }
        .amount-number {
            font-size: 64px; font-weight: 700; letter-spacing: -2px; font-variant-numeric: tabular-nums;
            font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Consolas", monospace; transition: color 0.5s;
        }
        .state-rest .amount-number     { color: #7c3aed; }
        .state-before .amount-number   { color: #475569; }
        .state-working .amount-number  { color: #6ee7b7; }
        .state-after .amount-number    { color: #fcd34d; }
        .state-overtime .amount-number { color: #fca5a5; }
        .amount-label { font-size: 13px; color: #64748b; margin-top: 2px; transition: color 0.5s; }
        .state-rest .amount-label     { color: #7c3aed; }
        .state-working .amount-label  { color: #059669; }
        .state-after .amount-label    { color: #b45309; }
        .state-overtime .amount-label { color: #dc2626; }

        /* Amount breakdown (overtime) */
        .amount-breakdown { display: none; text-align: center; font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .state-overtime .amount-breakdown { display: block; }
        .amount-breakdown span { margin: 0 6px; }

        .progress-section { margin: 20px 0 20px; }
        .progress-bar-outer { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-bar-inner { height: 100%; border-radius: 2px; transition: width 1s linear, background 0.5s; }
        .state-rest .progress-bar-inner     { width: 0%; background: #7c3aed; }
        .state-before .progress-bar-inner   { width: 0%; background: #475569; }
        .state-working .progress-bar-inner  { background: linear-gradient(90deg, #059669, #34d399); }
        .state-after .progress-bar-inner    { width: 100%; background: linear-gradient(90deg, #d97706, #fbbf24); }
        .state-overtime .progress-bar-inner { width: 100%; background: linear-gradient(90deg, #dc2626, #f87171); }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 8px; text-align: center; transition: all 0.5s; }
        .state-rest .stat-card     { border-color: rgba(139,92,246,0.12); }
        .state-working .stat-card  { border-color: rgba(16,185,129,0.12); }
        .state-after .stat-card    { border-color: rgba(245,158,11,0.12); }
        .state-overtime .stat-card { border-color: rgba(239,68,68,0.12); }
        .stat-value { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
        .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }

        .sandglass-section { display: flex; justify-content: center; margin-bottom: 12px; }
        .sandglass { width: 40px; height: 60px; transition: all 0.5s; }
        .sandglass svg { width: 100%; height: 100%; }

        /* Overtime action area */
        .overtime-actions { display: none; text-align: center; margin-bottom: 12px; }
        .state-after .overtime-actions { display: block; }
        .state-overtime .overtime-actions { display: block; }
        .overtime-btn {
            padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-family: inherit;
        }
        .overtime-btn.start {
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.35); color: #f87171;
        }
        .overtime-btn.start:hover { background: rgba(239,68,68,0.3); }
        .overtime-btn.stop {
            background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.35); color: #fbbf24;
        }
        .overtime-btn.stop:hover { background: rgba(245,158,11,0.3); }
        .overtime-rate-badge {
            display: inline-block; font-size: 11px; color: #f87171; background: rgba(239,68,68,0.1);
            padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
        }

        .demo-controls { display: flex; gap: 6px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
        .demo-btn {
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02); color: #64748b; font-size: 11px;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .demo-btn:hover { background: rgba(255,255,255,0.06); color: #94a3b8; }
        .demo-btn.active { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.1); color: #a5b4fc; }
        .demo-label { text-align: center; font-size: 10px; color: #334155; margin-top: 10px; }

        .holiday-sub-select { display: none; justify-content: center; gap: 4px; margin-top: 6px; }
        .state-rest .holiday-sub-select { display: flex; }
        .sub-btn {
            padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(139,92,246,0.2);
            background: rgba(139,92,246,0.05); color: #8b8faf; font-size: 10px;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .sub-btn:hover { background: rgba(139,92,246,0.15); color: #c4b5fd; }
        .sub-btn.active-sub { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.5); color: #c4b5fd; }

        .next-workday { display: none; text-align: center; font-size: 11px; color: #64748b; margin-top: 6px; }
        .state-rest .next-workday { display: block; }

        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
            pointer-events: none; transition: all 0.3s; opacity: 0; z-index: 999;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="clock-container state-before" id="clockContainer">
        <div class="top-bar">
            <span class="title">⏳ 时薪桌面钟</span>
            <div style="display:flex;gap:6px;">
                <button class="settings-btn" onclick="goToCalendar()" title="收入日历" style="font-size:14px;">📅</button>
                <button class="settings-btn" onclick="goToSetup()" title="修改设置">⚙</button>
            </div>
        </div>

        <div style="text-align:center;">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="statusText">⏳ 等待工作时间</span>
            </div>
        </div>

        <div class="holiday-icon" id="holidayIcon">🎌</div>

        <div class="message-section" id="messageSection">
            <div class="message-line1" id="messageLine1">距开始赚钱还有</div>
            <div class="message-line2" id="messageLine2">01:32:15</div>
        </div>

        <div class="amount-section">
            <div class="amount-breakdown" id="amountBreakdown">
                基本 <span id="breakdownBase">¥681.82</span> + 加班 <span id="breakdownOT">¥0.00</span>
            </div>
            <div>
                <span class="currency-symbol" id="currencySymbol">¥</span>
                <span class="amount-number" id="amountNumber">0.00</span>
            </div>
            <div class="amount-label" id="amountLabel">今日累计</div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
            </div>
        </div>

        <!-- Overtime actions -->
        <div class="overtime-actions" id="overtimeActions">
            <div class="overtime-rate-badge" id="overtimeRateBadge">🔥 加班费率 ×1.5</div>
            <button class="overtime-btn start" id="btnStartOT" onclick="startOvertime()">🔥 进入加班模式</button>
            <button class="overtime-btn stop" id="btnStopOT" onclick="stopOvertime()" style="display:none">🏁 结束加班</button>
        </div>

        <div class="sandglass-section">
            <div class="sandglass">
                <svg viewBox="0 0 40 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 4h24l-4 18L32 40H8l4-18-4-18z" stroke="currentColor" stroke-width="1.5" fill="none" id="sandFrame" />
                    <rect x="14" y="10" width="12" height="20" rx="1" id="sandTop" fill="currentColor" opacity="0.6" />
                    <rect x="14" y="42" width="12" height="0" rx="1" id="sandBottom" fill="currentColor" opacity="0.6" />
                </svg>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="statPerSec">0.0237</div>
                <div class="stat-label">元/秒</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDaily">681.82</div>
                <div class="stat-label">今日预计</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMonthly">15,000</div>
                <div class="stat-label">月薪(元)</div>
            </div>
        </div>

        <div class="next-workday" id="nextWorkdayHint">
            📅 下一个工作日：<span id="nextWorkdayDate">明天（周四）</span>
        </div>

        <div class="demo-controls">
            <button class="demo-btn" id="btnRest" onclick="switchState('rest')">🏖 休息日</button>
            <button class="demo-btn active" id="btnBefore" onclick="switchState('before')">⏳ 工作前</button>
            <button class="demo-btn" id="btnWorking" onclick="switchState('working')">💰 工作中</button>
            <button class="demo-btn" id="btnAfter" onclick="switchState('after')">🏁 工作后</button>
            <button class="demo-btn" id="btnOvertime" onclick="switchState('overtime')">🔥 加班</button>
        </div>
        <div class="holiday-sub-select" id="holidaySubSelect">
            <button class="sub-btn active-sub" onclick="setHolidayType('national')">🎌 法定假日</button>
            <button class="sub-btn" onclick="setHolidayType('weekend')">☀️ 周末</button>
        </div>
        <div class="demo-label">▲ 原型演示：手动切换状态 ▲</div>
    </div>

    <script>
        // ========== SETTINGS ==========
        let settings = (() => {
            try {
                const stored = sessionStorage.getItem('wageClockSettings');
                if (stored) return JSON.parse(stored);
            } catch(e) {}
            return {
                monthlySalary: 15000, workingDays: 22,
                workStart: '09:00', workEnd: '18:00',
                dailySalary: 15000 / 22, workHours: 9,
                perSecondRate: (15000 / 22) / 9 / 3600,
                workDaysOfWeek: [true,true,true,true,true,false,false],
                scheduleType: 'dual', satWorkThisWeek: false,
                overtimeSettings: { mode:'rate', multiplier:1.5, customAmount:50, customUnit:'hour' }
            };
        })();
        // Ensure overtimeSettings exists (backward compat)
        if (!settings.overtimeSettings) {
            settings.overtimeSettings = { mode:'rate', multiplier: settings.overtimeRate||1.5, customAmount:50, customUnit:'second' };
        }

        // ========== HOLIDAY DATA ==========
        const holidayDB = {
            '2026-01-01':'元旦','2026-02-17':'除夕','2026-02-18':'春节','2026-02-19':'春节',
            '2026-02-20':'春节','2026-02-21':'春节','2026-02-22':'春节','2026-02-23':'春节',
            '2026-04-05':'清明节','2026-05-01':'劳动节','2026-05-02':'劳动节','2026-05-03':'劳动节',
            '2026-05-31':'端午节','2026-09-25':'中秋节',
            '2026-10-01':'国庆节','2026-10-02':'国庆节','2026-10-03':'国庆节',
            '2026-10-04':'国庆节','2026-10-05':'国庆节','2026-10-06':'国庆节','2026-10-07':'国庆节',
        };
        const makeupWorkdays = ['2026-02-14','2026-02-28','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];

        // ========== STATE ==========
        let currentState = 'before';
        let holidayType = 'national';
        let animationId = null;
        let accumulatedAmount = 0;   // total displayed amount
        let baseDayAmount = 0;       // regular workday earnings (capped at dailySalary)
        let overtimeAmount = 0;      // overtime earnings
        let countdownSeconds = 0;
        let overtimeStartTime = null;

        // ========== TIME HELPERS ==========
        function getWorkStart() {
            const [h,m] = (settings.workStart||'09:00').split(':').map(Number);
            const d = new Date(); d.setHours(h,m,0,0); return d;
        }
        function getWorkEnd() {
            const [h,m] = (settings.workEnd||'18:00').split(':').map(Number);
            const d = new Date(); d.setHours(h,m,0,0); return d;
        }
        function getWorkSeconds() { return (getWorkEnd() - getWorkStart()) / 1000; }
        function getOTRatePerSecond() {
            const ot = settings.overtimeSettings || { mode:'rate', multiplier:1.5 };
            if (ot.mode === 'persecond') return settings.perSecondRate;
            if (ot.mode === 'custom') {
                if (ot.customUnit === 'once') return 0; // one-time fee, not per-second
                if (ot.customUnit === 'hour') return (ot.customAmount || 0) / 3600;
                return ot.customAmount || 0; // 'second'
            }
            return settings.perSecondRate * (ot.multiplier || 1.5);
        }
        function getOTRateLabel() {
            const ot = settings.overtimeSettings || { mode:'rate', multiplier:1.5 };
            if (ot.mode === 'persecond') return '按秒薪 ¥'+settings.perSecondRate.toFixed(4)+'/秒';
            if (ot.mode === 'custom') {
                if (ot.customUnit === 'once') return '单次 ¥'+(ot.customAmount||0).toFixed(2);
                if (ot.customUnit === 'hour') return '时薪 ¥'+(ot.customAmount||0).toFixed(2)+' (≈'+((ot.customAmount||0)/3600).toFixed(4)+'/秒)';
                return '自定义 ¥'+(ot.customAmount||0).toFixed(2)+'/秒';
            }
            return '×'+(ot.multiplier||1.5)+' (¥'+(settings.perSecondRate*(ot.multiplier||1.5)).toFixed(4)+'/秒)';
        }

        // ========== CALENDAR ==========
        function isTodayRestDay() {
            const today = new Date();
            const dateStr = today.toISOString().slice(0,10);
            const dayOfWeek = today.getDay();
            if (makeupWorkdays.includes(dateStr)) return {rest:false,reason:'调休工作日'};
            if (holidayDB[dateStr]) return {rest:true,reason:holidayDB[dateStr],type:'national'};
            const idx = dayOfWeek===0?6:dayOfWeek-1;
            const wd = settings.workDaysOfWeek||[true,true,true,true,true,false,false];
            if (!wd[idx]) {
                const dn=['周日','周一','周二','周三','周四','周五','周六'];
                return {rest:true,reason:dn[dayOfWeek]+'休息',type:'weekend'};
            }
            return {rest:false,reason:null};
        }
        function getNextWorkday() {
            const d=new Date();
            const wd=settings.workDaysOfWeek||[true,true,true,true,true,false,false];
            for(let i=1;i<=14;i++){d.setDate(d.getDate()+1);const ds=d.toISOString().slice(0,10);const dow=d.getDay();
            if(makeupWorkdays.includes(ds))return new Date(d);if(holidayDB[ds])continue;
            const idx=dow===0?6:dow-1;if(!wd[idx])continue;return new Date(d);}
            return new Date();
        }

        // ========== STATE SWITCHING ==========
        function switchState(state) {
            currentState = state;
            document.querySelectorAll('.demo-btn').forEach(b=>b.classList.remove('active'));
            const bm={rest:'btnRest',before:'btnBefore',working:'btnWorking',after:'btnAfter',overtime:'btnOvertime'};
            if(bm[state])document.getElementById(bm[state]).classList.add('active');
            if(animationId){cancelAnimationFrame(animationId);animationId=null;}
            const c=document.getElementById('clockContainer');
            c.classList.remove('state-rest','state-before','state-working','state-after','state-overtime');
            c.classList.add('state-'+state);

            if(state==='rest')showRestDay();
            else if(state==='before')showBeforeWork();
            else if(state==='working')showWorking();
            else if(state==='after')showAfterWork();
            else if(state==='overtime')startOvertime();
        }

        function setHolidayType(type){holidayType=type;
            document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active-sub'));
            if(type==='national')document.querySelectorAll('.sub-btn')[0].classList.add('active-sub');
            else document.querySelectorAll('.sub-btn')[1].classList.add('active-sub');
            showRestDay();}

        // ========== REST DAY ==========
        function showRestDay(){
            const isH=holidayType==='national',hn=isH?'国庆节':'';
            document.getElementById('statusText').textContent=isH?'🎌 今日休息 · 法定节假日':'☀️ 今日休息';
            document.getElementById('holidayIcon').textContent=isH?'🎌':'☀️';
            document.getElementById('messageLine1').textContent=isH?hn+' · 法定节假日':'好好休息~';
            document.getElementById('messageLine2').textContent=isH?'今日不计算薪资':'享受你的周末时光';
            document.getElementById('amountNumber').textContent='0.00';
            document.getElementById('amountLabel').textContent=isH?'休息日 · 暂停计时':'周末 · 暂停计时';
            document.getElementById('progressBar').style.width='0%';
            document.getElementById('overtimeActions').style.display='none';
            document.getElementById('amountBreakdown').style.display='none';
            const nxt=getNextWorkday();
            const dn=['日','一','二','三','四','五','六'];
            document.getElementById('nextWorkdayDate').textContent=nxt.getMonth()+1+'月'+nxt.getDate()+'日（周'+dn[nxt.getDay()]+'）';
            updateSandglass('rest');updateStats();
        }

        // ========== BEFORE WORK ==========
        function showBeforeWork(){
            document.getElementById('statusText').textContent='⏳ 等待工作时间';
            document.getElementById('holidayIcon').style.display='none';
            document.getElementById('messageLine1').textContent='距开始赚钱还有';
            document.getElementById('overtimeActions').style.display='none';
            document.getElementById('amountBreakdown').style.display='none';
            const now=new Date(), start=getWorkStart();
            if(now>=start)start.setDate(start.getDate()+1);
            countdownSeconds=Math.floor((start-now)/1000);
            if(countdownSeconds<0)countdownSeconds=5535;
            updateCountdownDisplay();animateCountdown();
            accumulatedAmount=0;baseDayAmount=0;overtimeAmount=0;
            document.getElementById('amountNumber').textContent='0.00';
            document.getElementById('amountLabel').textContent='今日累计';
            document.getElementById('progressBar').style.width='0%';
            updateSandglass('before');updateStats();
        }

        // ========== WORKING (with back-calculation fix) ==========
        function showWorking(){
            document.getElementById('statusText').textContent='💰 工作中 · 每秒累加';
            document.getElementById('holidayIcon').style.display='none';
            document.getElementById('overtimeActions').style.display='none';
            document.getElementById('amountBreakdown').style.display='none';
            const now=new Date(), start=getWorkStart(), end=getWorkEnd();

            // FIXED: back-calculate today's earnings so far
            const elapsedSec=Math.max(0,(now-start)/1000);
            const totalWorkSec=getWorkSeconds();
            const cappedSec=Math.min(elapsedSec,totalWorkSec);
            baseDayAmount=cappedSec*settings.perSecondRate;
            overtimeAmount=0;
            accumulatedAmount=baseDayAmount;

            // Show "catching up" message
            const elapsedH=Math.floor(elapsedSec/3600);
            const elapsedM=Math.floor((elapsedSec%3600)/60);
            document.getElementById('messageLine1').textContent='今天已工作 '+elapsedH+'小时'+elapsedM+'分钟';
            document.getElementById('messageLine2').textContent='回溯计算完成，继续累加中...';
            setTimeout(()=>{document.getElementById('messageLine1').textContent='';document.getElementById('messageLine2').textContent='';},3000);

            updateWorkingDisplay();animateWorking();
            document.getElementById('amountLabel').textContent='今日累计 · 跳动中';
            updateProgressDuringWork();updateSandglass('working');updateStats();
        }

        // ========== AFTER WORK ==========
        function showAfterWork(){
            document.getElementById('statusText').textContent='🏁 今日工作已结束';
            document.getElementById('holidayIcon').style.display='none';
            document.getElementById('messageLine1').textContent='';
            document.getElementById('messageLine2').textContent='';
            document.getElementById('amountBreakdown').style.display='none';

            // Full regular day
            baseDayAmount=settings.dailySalary;
            overtimeAmount=0;
            accumulatedAmount=baseDayAmount;
            document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2);
            document.getElementById('amountLabel').textContent='今日日薪 · 已定格';
            document.getElementById('progressBar').style.width='100%';

            // Show overtime entry button
            document.getElementById('overtimeActions').style.display='block';
            document.getElementById('btnStartOT').style.display='inline-block';
            document.getElementById('btnStopOT').style.display='none';
            document.getElementById('overtimeRateBadge').textContent='🔥 '+getOTRateLabel();

            updateSandglass('after');updateStats();
            showToast('🏁 今日日薪 ¥'+accumulatedAmount.toFixed(2)+' — 需要加班吗？');
        }

        // ========== OVERTIME ==========
        function startOvertime(){
            document.getElementById('statusText').textContent='🔥 加班中 · '+getOTRateLabel();
            document.getElementById('holidayIcon').style.display='none';
            document.getElementById('messageLine1').textContent='';
            document.getElementById('messageLine2').textContent='';

            // Keep base day amount, start overtime from now
            if(currentState==='after'||currentState!=='overtime'){
                if(baseDayAmount<settings.dailySalary)baseDayAmount=settings.dailySalary;
                overtimeStartTime=new Date();
                if(overtimeAmount===0)overtimeAmount=0;
            }
            if(!overtimeStartTime)overtimeStartTime=new Date();
            accumulatedAmount=baseDayAmount+overtimeAmount;

            updateWorkingDisplay();
            updateOvertimeBreakdown();
            document.getElementById('amountBreakdown').style.display='block';
            document.getElementById('amountLabel').textContent='基本+加班 · 跳动中';
            document.getElementById('progressBar').style.width='100%';

            // Toggle buttons
            document.getElementById('overtimeActions').style.display='block';
            document.getElementById('btnStartOT').style.display='none';
            document.getElementById('btnStopOT').style.display='inline-block';
            document.getElementById('overtimeRateBadge').textContent='🔥 '+getOTRateLabel();

            if(animationId)cancelAnimationFrame(animationId);
            animateOvertime();
            updateSandglass('overtime');updateStats();
            showToast('🔥 进入加班模式！费率 ×'+settings.overtimeRate);

            // Also update container state class
            const c=document.getElementById('clockContainer');
            c.classList.remove('state-after');c.classList.add('state-overtime');
            currentState='overtime';
            document.querySelectorAll('.demo-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('btnOvertime').classList.add('active');
        }

        function stopOvertime(){
            // Finalize overtime
            if(overtimeStartTime){
                const otSec=(new Date()-overtimeStartTime)/1000;
                overtimeAmount+=otSec*getOTRatePerSecond();
            }
            overtimeStartTime=null;
            accumulatedAmount=baseDayAmount+overtimeAmount;
            document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2);
            document.getElementById('amountLabel').textContent='今日总计（含加班）· 已定格';
            document.getElementById('amountBreakdown').style.display='block';
            updateOvertimeBreakdown();
            document.getElementById('progressBar').style.width='100%';
            document.getElementById('btnStartOT').style.display='inline-block';
            document.getElementById('btnStartOT').textContent='🔥 继续加班';
            document.getElementById('btnStopOT').style.display='none';

            if(animationId){cancelAnimationFrame(animationId);animationId=null;}
            showToast('🏁 加班结束！加班共计 ¥'+overtimeAmount.toFixed(2));
        }

        function updateOvertimeBreakdown(){
            document.getElementById('breakdownBase').textContent='¥'+baseDayAmount.toFixed(2);
            document.getElementById('breakdownOT').textContent='¥'+overtimeAmount.toFixed(2);
        }

        // ========== ANIMATIONS ==========
        function animateCountdown(){
            const tick=()=>{countdownSeconds--;
                if(countdownSeconds<=0){switchState('working');showToast('⏰ 工作时间到！开始赚钱 💰');return;}
                updateCountdownDisplay();
                animationId=requestAnimationFrame(()=>setTimeout(tick,1000));};
            animationId=requestAnimationFrame(()=>setTimeout(tick,1000));
        }
        function updateCountdownDisplay(){
            const h=Math.floor(countdownSeconds/3600),m=Math.floor((countdownSeconds%3600)/60),s=countdownSeconds%60;
            document.getElementById('messageLine2').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        }

        function animateWorking(){
            let lastTime=Date.now(),sandFrame=0;
            const tick=()=>{
                const now=Date.now();
                const delta=(now-lastTime)/1000;lastTime=now;
                // Cap base at dailySalary, excess would be overtime
                const remaining=settings.dailySalary-baseDayAmount;
                const increment=delta*settings.perSecondRate;
                if(remaining>0.001){
                    const add=Math.min(increment,remaining);
                    baseDayAmount+=add;accumulatedAmount=baseDayAmount+overtimeAmount;
                    // Auto-transition to after-work when base reaches daily
                    if(baseDayAmount>=settings.dailySalary-0.001&&remaining<increment+0.001){
                        updateWorkingDisplay();updateProgressDuringWork();
                        switchState('after');return;
                    }
                }
                updateWorkingDisplay();updateProgressDuringWork();
                sandFrame++;if(sandFrame%30===0)updateSandglass('working');
                animationId=requestAnimationFrame(tick);
            };
            animationId=requestAnimationFrame(tick);
        }

        function animateOvertime(){
            let lastTime=Date.now(),sandFrame=0;
            overtimeStartTime=new Date();
            const tick=()=>{
                const now=Date.now();
                const delta=(now-lastTime)/1000;lastTime=now;
                overtimeAmount+=delta*getOTRatePerSecond();
                accumulatedAmount=baseDayAmount+overtimeAmount;
                updateWorkingDisplay();updateOvertimeBreakdown();
                sandFrame++;if(sandFrame%30===0)updateSandglass('overtime');
                animationId=requestAnimationFrame(tick);
            };
            animationId=requestAnimationFrame(tick);
        }

        function updateWorkingDisplay(){
            document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2);
        }

        function updateProgressDuringWork(){
            const now=new Date(),start=getWorkStart(),end=getWorkEnd();
            const total=(end-start)/1000,elapsed=(now-start)/1000;
            document.getElementById('progressBar').style.width=Math.min(100,Math.max(0,(elapsed/total)*100))+'%';
        }

        // ========== SANDGLASS ==========
        function updateSandglass(state){
            const f=document.getElementById('sandFrame'),t=document.getElementById('sandTop'),b=document.getElementById('sandBottom');
            const colors={rest:'#a78bfa',before:'#475569',working:'#34d399',after:'#fbbf24',overtime:'#f87171'};
            const c=colors[state]||'#475569';
            f.setAttribute('stroke',c);
            if(state==='rest'||state==='before'){
                t.setAttribute('y','10');t.setAttribute('height','20');t.setAttribute('fill',c);
                b.setAttribute('y','42');b.setAttribute('height','0');b.setAttribute('fill',c);
                document.getElementById('holidayIcon').style.display=state==='rest'?'block':'none';
            }else if(state==='working'){
                const pct=parseFloat(document.getElementById('progressBar').style.width)||50;
                const topH=Math.max(0,20*(1-pct/100)),bottomH=Math.min(20,20*(pct/100));
                t.setAttribute('y',10+(20-topH));t.setAttribute('height',topH);t.setAttribute('fill',c);
                b.setAttribute('y',42);b.setAttribute('height',bottomH);b.setAttribute('fill',c);
                document.getElementById('holidayIcon').style.display='none';
            }else{
                t.setAttribute('y','30');t.setAttribute('height','0');t.setAttribute('fill',c);
                b.setAttribute('y','42');b.setAttribute('height','20');b.setAttribute('fill',c);
                document.getElementById('holidayIcon').style.display='none';
            }
        }
        function updateStats(){
            document.getElementById('statPerSec').textContent=settings.perSecondRate.toFixed(4);
            document.getElementById('statDaily').textContent=settings.dailySalary.toFixed(2);
            document.getElementById('statMonthly').textContent=settings.monthlySalary.toLocaleString();
        }
        function showToast(msg){
            const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';
            t.style.background='rgba(16,185,129,0.9)';
            setTimeout(()=>{t.style.opacity='0'},3000);
        }
        function goToSetup(){window.location.href='setup.html';}
        function goToCalendar(){window.location.href='calendar.html';}

        // ========== AUTO-DETECT ON LOAD ==========
        const urlParams=new URLSearchParams(window.location.search);
        const initState=urlParams.get('state')||'auto';
        if(initState==='auto'){
            const check=isTodayRestDay();
            if(check.rest){
                holidayType=check.type;switchState('rest');
                document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active-sub'));
                if(check.type==='national')document.querySelectorAll('.sub-btn')[0].classList.add('active-sub');
                else document.querySelectorAll('.sub-btn')[1].classList.add('active-sub');
            }else{
                const now=new Date(),start=getWorkStart(),end=getWorkEnd();
                if(now<start)switchState('before');
                else if(now>end)switchState('after');
                else switchState('working');
            }
        }else if(initState==='rest'){switchState('rest');}
        else{switchState(initState);}
    </script>
</body>
</html>
