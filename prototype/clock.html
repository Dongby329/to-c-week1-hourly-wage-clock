<!-- 时薪桌面钟 · 时钟 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟</title>
    <style>
        :root {
            --bg: #09090b; --surface: #111114; --border: #222228;
            --text: #e4e4e7; --muted: #71717a; --accent: #f59e0b;
        }
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse 50% 40% at 50% 45%, rgba(245,158,11,0.03) 0%, transparent 60%),
                        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,255,255,0.008) 0%, transparent 70%);
        }
        .clock {
            position: relative; z-index: 1;
            width: 380px; min-height: 520px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px 26px 24px;
            animation: appear 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes appear { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        /* Top bar */
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .topbar .brand { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.2px; }
        .topbar .actions { display:flex; gap:4px; }
        .topbar .btn {
            width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
            background:transparent; color:var(--muted); cursor:pointer; font-size:14px;
            display:flex; align-items:center; justify-content:center; transition:all 0.2s;
        }
        .topbar .btn:hover { background:rgba(255,255,255,0.04); color:var(--text); }

        /* Status pill */
        .status-row { text-align:center; margin-bottom:20px; }
        .pill {
            display:inline-flex; align-items:center; gap:6px; padding:3px 14px;
            border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.2px;
        }
        .pill .dot { width:5px; height:5px; border-radius:50%; }
        .pill.rest     { background:rgba(139,92,246,0.08); color:#a78bfa; } .pill.rest .dot     { background:#a78bfa; }
        .pill.before   { background:rgba(113,113,122,0.08); color:#a1a1aa; } .pill.before .dot   { background:#a1a1aa; }
        .pill.working  { background:rgba(52,211,153,0.08); color:#34d399; }  .pill.working .dot  { background:#34d399; animation: breathe 1.5s ease-in-out infinite; }
        .pill.after    { background:rgba(251,191,36,0.08); color:#fbbf24; } .pill.after .dot    { background:#fbbf24; }
        .pill.overtime { background:rgba(248,113,113,0.08); color:#f87171; } .pill.overtime .dot { background:#f87171; animation: breathe 0.8s ease-in-out infinite; }
        @keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.8)} }

        /* Message */
        .msg { text-align:center; min-height:40px; margin-bottom:8px; }
        .msg-line1 { font-size:12px; color:var(--muted); margin-bottom:2px; }
        .msg-line2 { font-size:18px; font-weight:400; color:#a1a1aa; font-family:"SF Mono","Fira Code","Consolas",monospace; letter-spacing:1px; }

        /* Amount */
        .amount-section { text-align:center; margin-bottom:4px; }
        .amount-row { display:inline-flex; align-items:flex-start; }
        .symbol { font-size:24px; font-weight:300; margin-right:1px; margin-top:10px; color:var(--muted); transition:color 0.5s; }
        .amount {
            font-size:68px; font-weight:700; letter-spacing:-3px; line-height:1;
            font-family:"SF Mono","Fira Code","JetBrains Mono","Consolas",monospace;
            transition:color 0.5s;
        }
        .state-rest .symbol,.state-rest .amount       { color:#a78bfa; }
        .state-before .symbol,.state-before .amount     { color:#52525b; }
        .state-working .symbol,.state-working .amount   { color:#34d399; }
        .state-after .symbol,.state-after .amount       { color:#fbbf24; }
        .state-overtime .symbol,.state-overtime .amount { color:#f87171; }
        .amount-sub {
            font-size:12px; color:var(--muted); margin-top:2px; transition:color 0.5s;
        }
        .state-working .amount-sub { color:#059669; }
        .state-after .amount-sub   { color:#b45309; }
        .state-overtime .amount-sub { color:#dc2626; }

        /* Breakdown (overtime) */
        .breakdown { display:none; text-align:center; font-size:11px; color:var(--muted); margin-bottom:4px; }
        .state-overtime .breakdown { display:block; }
        .breakdown span { margin:0 8px; }

        /* Progress */
        .progress-wrap { margin:16px 0 18px; }
        .progress-outer { height:3px; background:rgba(255,255,255,0.04); border-radius:2px; overflow:hidden; }
        .progress-inner { height:100%; border-radius:2px; transition:width 1s linear; }
        .state-rest .progress-inner     { width:0; background:#8b5cf6; }
        .state-before .progress-inner   { width:0; background:#52525b; }
        .state-working .progress-inner  { background:linear-gradient(90deg,#059669,#34d399); }
        .state-after .progress-inner    { width:100%; background:linear-gradient(90deg,#d97706,#fbbf24); }
        .state-overtime .progress-inner { width:100%; background:linear-gradient(90deg,#dc2626,#f87171); }

        /* OT actions */
        .ot-actions { display:none; text-align:center; margin-bottom:14px; }
        .state-after .ot-actions,.state-overtime .ot-actions { display:block; }
        .ot-label { font-size:10px; color:#dc2626; margin-bottom:6px; }
        .ot-btn {
            padding:8px 28px; border-radius:8px; font-size:13px; font-weight:600;
            cursor:pointer; font-family:inherit; transition:all 0.2s; border:1px solid;
        }
        .ot-btn.start { background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.2); color:#f87171; }
        .ot-btn.start:hover { background:rgba(239,68,68,0.16); }
        .ot-btn.stop  { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.2); color:#fbbf24; }
        .ot-btn.stop:hover  { background:rgba(245,158,11,0.16); }
        .ot-btn-group { display:flex; gap:6px; justify-content:center; }

        /* Stats */
        .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
        .stat {
            background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04);
            border-radius:10px; padding:10px 6px; text-align:center; transition:border-color 0.5s;
        }
        .state-working .stat { border-color:rgba(52,211,153,0.08); }
        .state-overtime .stat { border-color:rgba(248,113,113,0.08); }
        .stat .val { font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; }
        .stat .lbl { font-size:10px; color:var(--muted); margin-top:1px; }

        /* Demo controls */
        .demo { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin-top:6px; }
        .demo button {
            padding:5px 10px; border-radius:6px; font-size:10px; cursor:pointer; font-family:inherit;
            border:1px solid rgba(255,255,255,0.06); background:transparent; color:#52525b; transition:all 0.2s;
        }
        .demo button:hover { border-color:rgba(255,255,255,0.12); color:#a1a1aa; }
        .demo button.on { border-color:rgba(245,158,11,0.25); background:rgba(245,158,11,0.06); color:#f59e0b; }
        .demo .hint { width:100%; text-align:center; font-size:9px; color:#27272a; margin-top:4px; }

        /* Toast */
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            padding:8px 18px; border-radius:8px; font-size:12px; font-weight:500;
            pointer-events:none; opacity:0; z-index:99; transition:opacity 0.3s;
            background:#18181b; border:1px solid #27272a; color:#e4e4e7;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="clock state-before" id="clockContainer">
        <!-- Top bar -->
        <div class="topbar">
            <span class="brand">⏳ 时薪桌面钟</span>
            <div class="actions">
                <button class="btn" onclick="goToCalendar()" title="收入日历">📅</button>
                <button class="btn" onclick="goToSetup()" title="设置">⚙</button>
                <button class="btn" onclick="logout()" title="切换用户" style="font-size:12px;">⇄</button>
            </div>
        </div>

        <!-- Status -->
        <div class="status-row">
            <span class="pill before" id="pill"><span class="dot"></span><span id="statusText">等待工作时间</span></span>
        </div>

        <!-- Holiday icon -->
        <div id="holidayIconWrap" style="text-align:center;display:none;margin-bottom:4px;">
            <span style="font-size:36px;" id="holidayIcon">🎌</span>
        </div>

        <!-- Message -->
        <div class="msg">
            <div class="msg-line1" id="msgLine1">距开始赚钱还有</div>
            <div class="msg-line2" id="msgLine2">01:32:15</div>
        </div>

        <!-- Amount -->
        <div class="amount-section">
            <div class="breakdown" id="breakdown">
                基本 <span id="bdBase">¥681.82</span> + 加班 <span id="bdOT">¥0.00</span>
            </div>
            <div class="amount-row">
                <span class="symbol" id="symbol">¥</span>
                <span class="amount" id="amountNumber">0.00</span>
            </div>
            <div class="amount-sub" id="amountLabel">今日累计</div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-outer"><div class="progress-inner" id="progressBar" style="width:0%"></div></div>
        </div>

        <!-- OT actions -->
        <div class="ot-actions" id="otActions">
            <div class="ot-label" id="otLabel">🔥 加班费率 ×1.5</div>
            <div class="ot-btn-group">
                <button class="ot-btn start" id="btnStartOT" onclick="startOvertime()">进入加班</button>
                <button class="ot-btn stop" id="btnStopOT" onclick="stopOvertime()" style="display:none">结束加班</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat"><div class="val" id="statPerSec">0.0237</div><div class="lbl">元/秒</div></div>
            <div class="stat"><div class="val" id="statDaily">681.82</div><div class="lbl">今日预计</div></div>
            <div class="stat"><div class="val" id="statMonthly">15,000</div><div class="lbl">月薪(元)</div></div>
        </div>

        <!-- Demo -->
        <div class="demo">
            <button id="dRest" onclick="switchState('rest')">🏖 休息</button>
            <button id="dBefore" class="on" onclick="switchState('before')">⏳ 工作前</button>
            <button id="dWorking" onclick="switchState('working')">💰 工作中</button>
            <button id="dAfter" onclick="switchState('after')">🏁 工作后</button>
            <button id="dOvertime" onclick="switchState('overtime')">🔥 加班</button>
            <div class="hint">原型演示 · 手动切换</div>
        </div>
    </div>

<script>
// ============ AUTH CHECK ============
const CURRENT_USER = sessionStorage.getItem('wageClock_currentUser');
if (!CURRENT_USER) { window.location.href = 'login.html'; }

// ============ USER-SCOPED STORAGE ============
function userKey(k) { return 'wageClock_' + CURRENT_USER + '_' + k; }
function loadUserData(k, def) {
    try { const v = localStorage.getItem(userKey(k)); return v ? JSON.parse(v) : def; }
    catch(e) { return def; }
}
function saveUserData(k, val) { localStorage.setItem(userKey(k), JSON.stringify(val)); }

// ============ SETTINGS ============
let settings = loadUserData('settings', {
    monthlySalary: 15000, workingDays: 22, workStart: '09:00', workEnd: '18:00',
    dailySalary: 15000/22, workHours: 9, perSecondRate: (15000/22)/9/3600,
    workDaysOfWeek: [true,true,true,true,true,false,false],
    scheduleType: 'dual', satWorkThisWeek: false,
    overtimeSettings: { mode:'rate', multiplier:1.5, customAmount:50, customUnit:'hour' }
});
if (!settings.overtimeSettings) {
    settings.overtimeSettings = { mode:'rate', multiplier:1.5, customAmount:50, customUnit:'hour' };
}

// Sync from sessionStorage (set by setup page)
try {
    const sess = sessionStorage.getItem('wageClockSettings');
    if (sess) { settings = JSON.parse(sess); saveUserData('settings', settings); sessionStorage.removeItem('wageClockSettings'); }
} catch(e) {}

// ============ HOLIDAY DATA ============
const holidayDB = {
    '2026-01-01':'元旦','2026-02-17':'除夕','2026-02-18':'春节','2026-02-19':'春节',
    '2026-02-20':'春节','2026-02-21':'春节','2026-02-22':'春节','2026-02-23':'春节',
    '2026-04-05':'清明节','2026-05-01':'劳动节','2026-05-02':'劳动节','2026-05-03':'劳动节',
    '2026-05-31':'端午节','2026-09-25':'中秋节',
    '2026-10-01':'国庆节','2026-10-02':'国庆节','2026-10-03':'国庆节',
    '2026-10-04':'国庆节','2026-10-05':'国庆节','2026-10-06':'国庆节','2026-10-07':'国庆节',
};
const makeupWorkdays = ['2026-02-14','2026-02-28','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];

// ============ STATE ============
let currentState = 'before', animationId = null;
let accumulatedAmount = 0, baseDayAmount = 0, overtimeAmount = 0;
let countdownSeconds = 0, overtimeStartTime = null;

// ============ HELPERS ============
function getWorkStart() { const [h,m]=(settings.workStart||'09:00').split(':').map(Number); const d=new Date(); d.setHours(h,m,0,0); return d; }
function getWorkEnd()   { const [h,m]=(settings.workEnd||'18:00').split(':').map(Number); const d=new Date(); d.setHours(h,m,0,0); return d; }
function getWorkSecs()  { return (getWorkEnd()-getWorkStart())/1000; }
function getOTRatePerSec() {
    const ot=settings.overtimeSettings||{mode:'rate',multiplier:1.5};
    if(ot.mode==='persecond') return settings.perSecondRate;
    if(ot.mode==='custom') {
        if(ot.customUnit==='once') return 0;
        if(ot.customUnit==='hour') return (ot.customAmount||0)/3600;
        return ot.customAmount||0;
    }
    return settings.perSecondRate*(ot.multiplier||1.5);
}
function getOTLabel() {
    const ot=settings.overtimeSettings||{mode:'rate',multiplier:1.5};
    if(ot.mode==='persecond') return '按秒薪 ¥'+settings.perSecondRate.toFixed(4)+'/秒';
    if(ot.mode==='custom') {
        if(ot.customUnit==='once') return '单次 ¥'+(ot.customAmount||0).toFixed(2);
        if(ot.customUnit==='hour') return '时薪 ¥'+(ot.customAmount||0).toFixed(2);
        return '¥'+(ot.customAmount||0).toFixed(2)+'/秒';
    }
    return '×'+(ot.multiplier||1.5);
}

// ============ CALENDAR ============
function isTodayRest() {
    const t=new Date(), ds=t.toISOString().slice(0,10), dow=t.getDay();
    if(makeupWorkdays.includes(ds)) return {rest:false};
    if(holidayDB[ds]) return {rest:true,reason:holidayDB[ds],type:'national'};
    const idx=dow===0?6:dow-1;
    const wd=settings.workDaysOfWeek||[true,true,true,true,true,false,false];
    if(!wd[idx]) return {rest:true,reason:'休息日',type:'weekend'};
    return {rest:false};
}

// ============ STATE SWITCH ============
function switchState(s) {
    currentState=s;
    document.querySelectorAll('.demo button').forEach(b=>b.classList.remove('on'));
    const dm={rest:'dRest',before:'dBefore',working:'dWorking',after:'dAfter',overtime:'dOvertime'};
    if(dm[s]) document.getElementById(dm[s]).classList.add('on');
    if(animationId){cancelAnimationFrame(animationId);animationId=null;}
    const c=document.getElementById('clockContainer');
    c.className='clock state-'+s;
    if(s==='rest') showRest();
    else if(s==='before') showBefore();
    else if(s==='working') showWorking();
    else if(s==='after') showAfter();
    else if(s==='overtime') startOvertime();
}

// ============ REST ============
function showRest(){
    const check=isTodayRest();
    const isH=check.type==='national',hn=check.reason||'';
    document.getElementById('statusText').textContent=isH?'🎌 法定节假日':'☀️ 今日休息';
    updatePill(isH?'rest':'rest');
    document.getElementById('holidayIconWrap').style.display='block';
    document.getElementById('holidayIcon').textContent=isH?'🎌':'☀️';
    document.getElementById('msgLine1').textContent=isH?hn+' · 法定节假日':'好好休息';
    document.getElementById('msgLine2').textContent=isH?'今日不计算薪资':'享受你的休息时光';
    document.getElementById('amountNumber').textContent='0.00';
    document.getElementById('amountLabel').textContent=isH?'休息日':'周末';
    document.getElementById('progressBar').style.width='0%';
    document.getElementById('otActions').style.display='none';
    document.getElementById('breakdown').style.display='none';
    updateStats();
}

// ============ BEFORE ============
function showBefore(){
    document.getElementById('statusText').textContent='等待工作时间';
    updatePill('before');
    document.getElementById('holidayIconWrap').style.display='none';
    document.getElementById('msgLine1').textContent='距开始赚钱还有';
    document.getElementById('otActions').style.display='none';
    document.getElementById('breakdown').style.display='none';
    const now=new Date(),start=getWorkStart();
    if(now>=start) start.setDate(start.getDate()+1);
    countdownSeconds=Math.floor((start-now)/1000);
    if(countdownSeconds<0) countdownSeconds=5535;
    updateCountdown(); animateCountdown();
    accumulatedAmount=0; baseDayAmount=0; overtimeAmount=0;
    document.getElementById('amountNumber').textContent='0.00';
    document.getElementById('amountLabel').textContent='今日累计';
    document.getElementById('progressBar').style.width='0%';
    updateStats();
}

// ============ WORKING ============
function showWorking(){
    document.getElementById('statusText').textContent='工作中 · 每秒累加';
    updatePill('working');
    document.getElementById('holidayIconWrap').style.display='none';
    document.getElementById('otActions').style.display='none';
    document.getElementById('breakdown').style.display='none';
    const now=new Date(),start=getWorkStart(),end=getWorkEnd();
    const elapsed=Math.max(0,(now-start)/1000);
    const total=getWorkSecs();
    baseDayAmount=Math.min(elapsed,Math.max(0,total))*settings.perSecondRate;
    overtimeAmount=0; accumulatedAmount=baseDayAmount;
    const eh=Math.floor(elapsed/3600),em=Math.floor((elapsed%3600)/60);
    document.getElementById('msgLine1').textContent='今日已工作 '+eh+'h '+em+'m，回溯计算完成';
    document.getElementById('msgLine2').textContent='';
    setTimeout(()=>{document.getElementById('msgLine1').textContent='';},3000);
    updateDisplay(); animateWorking();
    document.getElementById('amountLabel').textContent='今日累计 · 跳动中';
    updateProgress(); updateStats();
}

// ============ AFTER ============
function showAfter(){
    document.getElementById('statusText').textContent='今日工作已结束';
    updatePill('after');
    document.getElementById('holidayIconWrap').style.display='none';
    document.getElementById('msgLine1').textContent='';
    document.getElementById('msgLine2').textContent='';
    document.getElementById('breakdown').style.display='none';
    baseDayAmount=settings.dailySalary; overtimeAmount=0; accumulatedAmount=baseDayAmount;
    document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2);
    document.getElementById('amountLabel').textContent='今日日薪 · 已定格';
    document.getElementById('progressBar').style.width='100%';
    document.getElementById('otActions').style.display='block';
    document.getElementById('btnStartOT').style.display='inline-block';
    document.getElementById('btnStopOT').style.display='none';
    document.getElementById('otLabel').textContent='🔥 '+getOTLabel();
    updateStats();
    // Save today's earnings
    saveDayEarnings(baseDayAmount);
    toast('🏁 今日 ¥'+accumulatedAmount.toFixed(2)+' — 要加班吗？');
}

// ============ OVERTIME ============
function startOvertime(){
    document.getElementById('statusText').textContent='加班中 · '+getOTLabel();
    updatePill('overtime');
    document.getElementById('holidayIconWrap').style.display='none';
    document.getElementById('msgLine1').textContent='';
    document.getElementById('msgLine2').textContent='';
    if(baseDayAmount<settings.dailySalary) baseDayAmount=settings.dailySalary;
    if(!overtimeStartTime) overtimeStartTime=new Date();
    accumulatedAmount=baseDayAmount+overtimeAmount;
    updateDisplay(); updateBreakdown();
    document.getElementById('breakdown').style.display='block';
    document.getElementById('amountLabel').textContent='基本+加班 · 跳动中';
    document.getElementById('progressBar').style.width='100%';
    document.getElementById('otActions').style.display='block';
    document.getElementById('btnStartOT').style.display='none';
    document.getElementById('btnStopOT').style.display='inline-block';
    document.getElementById('otLabel').textContent='🔥 '+getOTLabel();
    if(animationId)cancelAnimationFrame(animationId);
    animateOvertime(); updateStats();
    document.getElementById('clockContainer').className='clock state-overtime';
    currentState='overtime';
    toast('🔥 进入加班模式');
}
function stopOvertime(){
    if(overtimeStartTime){ overtimeAmount+=(new Date()-overtimeStartTime)/1000*getOTRatePerSec(); }
    overtimeStartTime=null;
    accumulatedAmount=baseDayAmount+overtimeAmount;
    document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2);
    document.getElementById('amountLabel').textContent='今日总计（含加班）· 已定格';
    updateBreakdown(); document.getElementById('breakdown').style.display='block';
    document.getElementById('progressBar').style.width='100%';
    document.getElementById('btnStartOT').style.display='inline-block';
    document.getElementById('btnStartOT').textContent='继续加班';
    document.getElementById('btnStopOT').style.display='none';
    if(animationId){cancelAnimationFrame(animationId);animationId=null;}
    saveDayEarnings(accumulatedAmount);
    toast('🏁 含加班共 ¥'+accumulatedAmount.toFixed(2));
}

// ============ ANIMATIONS ============
function animateCountdown(){
    const tick=()=>{countdownSeconds--;
        if(countdownSeconds<=0){switchState('working');toast('⏰ 开始赚钱！');return;}
        updateCountdown(); animationId=requestAnimationFrame(()=>setTimeout(tick,1000));};
    animationId=requestAnimationFrame(()=>setTimeout(tick,1000));
}
function updateCountdown(){
    const h=Math.floor(countdownSeconds/3600),m=Math.floor((countdownSeconds%3600)/60),s=countdownSeconds%60;
    document.getElementById('msgLine2').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function animateWorking(){
    let lt=Date.now();
    const tick=()=>{
        const now=Date.now(),delta=(now-lt)/1000;lt=now;
        const remaining=settings.dailySalary-baseDayAmount;
        if(remaining>0.001){ const add=Math.min(delta*settings.perSecondRate,remaining); baseDayAmount+=add; }
        accumulatedAmount=baseDayAmount+overtimeAmount;
        updateDisplay(); updateProgress();
        if(baseDayAmount>=settings.dailySalary-0.001){ switchState('after'); return; }
        animationId=requestAnimationFrame(tick);
    };
    animationId=requestAnimationFrame(tick);
}
function animateOvertime(){
    let lt=Date.now(); overtimeStartTime=new Date();
    const tick=()=>{
        const now=Date.now(); overtimeAmount+=(now-lt)/1000*getOTRatePerSec(); lt=now;
        accumulatedAmount=baseDayAmount+overtimeAmount;
        updateDisplay(); updateBreakdown();
        animationId=requestAnimationFrame(tick);
    };
    animationId=requestAnimationFrame(tick);
}
function updateDisplay(){ document.getElementById('amountNumber').textContent=accumulatedAmount.toFixed(2); }
function updateBreakdown(){
    document.getElementById('bdBase').textContent='¥'+baseDayAmount.toFixed(2);
    document.getElementById('bdOT').textContent='¥'+overtimeAmount.toFixed(2);
}
function updateProgress(){
    const now=new Date(),start=getWorkStart(),end=getWorkEnd();
    document.getElementById('progressBar').style.width=Math.min(100,Math.max(0,((now-start)/(end-start))*100))+'%';
}
function updatePill(type){ const p=document.getElementById('pill'); p.className='pill '+type; }
function updateStats(){
    document.getElementById('statPerSec').textContent=settings.perSecondRate.toFixed(4);
    document.getElementById('statDaily').textContent=settings.dailySalary.toFixed(2);
    document.getElementById('statMonthly').textContent=settings.monthlySalary.toLocaleString();
}
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; setTimeout(()=>{t.style.opacity='0'},3000); }

// ============ DATA PERSISTENCE ============
function saveDayEarnings(amount) {
    const today = new Date().toISOString().slice(0,10);
    const earnings = loadUserData('earnings', {});
    earnings[today] = Math.round(amount * 100) / 100;
    saveUserData('earnings', earnings);
}

// ============ NAVIGATION ============
function goToSetup(){ window.location.href='setup.html'; }
function goToCalendar(){ window.location.href='calendar.html'; }
function logout(){ sessionStorage.removeItem('wageClock_currentUser'); window.location.href='login.html'; }

// ============ AUTO-DETECT ============
(function init(){
    const check = isTodayRest();
    if (check.rest) { switchState('rest'); return; }
    const now=new Date(), start=getWorkStart(), end=getWorkEnd();
    if (now < start) switchState('before');
    else if (now > end) switchState('after');
    else switchState('working');
})();
</script>
