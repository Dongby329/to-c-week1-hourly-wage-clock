<!-- 时薪桌面钟 · Hero -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #111114;
            --border: #222228;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #f59e0b;
            --accent-soft: #fef3c7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
        }

        .hero-container {
            position: relative; z-index: 1;
            text-align: center; padding: 2rem;
            max-width: 480px; width: 100%;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-icon {
            width: 80px; height: 80px;
            margin: 0 auto 32px;
            border-radius: 22px;
            background: linear-gradient(135deg, #1c1c1f 0%, #151518 100%);
            border: 1px solid #222228;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .hero-title {
            font-size: 32px; font-weight: 700;
            letter-spacing: -0.5px; margin-bottom: 8px;
            background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle {
            font-size: 15px; color: var(--muted);
            line-height: 1.6; margin-bottom: 40px;
            max-width: 320px; margin-left: auto; margin-right: auto;
        }
        .hero-stats {
            display: flex; gap: 2px; justify-content: center; margin-bottom: 48px;
        }
        .hero-stat {
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px 16px; font-size: 12px; color: var(--muted);
        }
        .hero-stat:first-child { border-radius: 8px 0 0 8px; }
        .hero-stat:last-child { border-radius: 0 8px 8px 0; }
        .hero-stat strong { color: var(--text); font-weight: 600; }

        .hero-btn {
            display: inline-block;
            padding: 14px 48px;
            border-radius: 12px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
            font-family: inherit; text-decoration: none;
            border: none;
            background: #fafafa; color: #09090b;
            letter-spacing: 0.2px;
        }
        .hero-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(250,250,250,0.12);
        }
        .hero-btn:active { transform: translateY(0); }

        .hero-footer {
            margin-top: 32px;
            font-size: 12px; color: #3f3f46;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="hero-icon">⏳</div>

        <h1 class="hero-title">时薪桌面钟</h1>
        <p class="hero-subtitle">
            看见时间的重量。<br>每一秒，都值得被计算。
        </p>

        <div class="hero-stats">
            <div class="hero-stat">月薪 <strong>自定义</strong></div>
            <div class="hero-stat">实时 <strong>秒级</strong></div>
            <div class="hero-stat">智能 <strong>自动检测</strong></div>
        </div>

        <div>
            <a href="login.html" class="hero-btn">开始使用</a>
        </div>

        <div class="hero-footer">
            已有账号？<a href="login.html" style="color:#a1a1aa;">登录</a>
        </div>
    </div>
</body>
</html>
