<!-- 时薪桌面钟 · Hero -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PixelChinese';
            src: url('https://cdn.jsdelivr.net/gh/TakWolf/fusion-pixel-font@main/fonts/fusion-pixel-12px-monospaced-zh_hans.woff2') format('woff2');
            font-display: swap;
        }
        :root {
            --bg: #08080c;
            --surface: #0f0f13;
            --border: #1e1e24;
            --text: #ededef;
            --muted: #6b6b75;
            --accent: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* DotGrid */
        .dotgrid-bg {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .dotgrid-bg canvas { display: block; width: 100%; height: 100%; pointer-events: none; }

        /* Hero */
        .hero-container {
            position: relative; z-index: 1;
            text-align: center; padding: 3rem 1rem;
            max-width: 640px; width: 100%;
            animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Pixel title */
        .hero-title-wrap {
            margin-bottom: 56px;
            overflow: visible;
        }
        .hero-title-sub {
            display: block;
            font-size: 18px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 3px;
            margin-top: 16px;
        }
        .hero-title-sub .shuffle-char-strip span {
            font-size: 18px;
            color: rgba(255,255,255,0.55);
        }
        .hero-title {
            font-family: 'PixelChinese', 'Press Start 2P', monospace;
            font-size: 26px; font-weight: 400;
            color: #ffffff;
            letter-spacing: 2px;
            line-height: 1.6;
            text-transform: none;
            display: inline-block;
            text-shadow: 0 0 60px rgba(255,255,255,0.10);
            max-width: 100%;
            word-break: keep-all;
        }
        /* Shuffle strips */
        .shuffle-char-wrap {
            display: inline-block; overflow: hidden;
            vertical-align: bottom; position: relative;
        }
        .shuffle-char-strip {
            display: inline-flex; flex-direction: column;
            will-change: transform;
        }
        .shuffle-char-strip span {
            display: block; text-align: center; line-height: 1.25;
            font-family: 'PixelChinese', 'Press Start 2P', monospace;
            font-size: 26px; color: #ffffff;
        }

        /* Button */
        .hero-btn-wrap { margin-bottom: 40px; }
        .hero-btn {
            display: inline-block;
            padding: 12px 44px;
            border-radius: 4px;
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.25s;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #d4d4d8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .hero-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.4);
            color: #fff;
            box-shadow: 0 0 32px rgba(255,255,255,0.04);
        }
        .hero-btn:active { background: rgba(255,255,255,0.1); }

        /* Welcome */
        .welcome-section { margin-top: 12px; }
        .welcome-greeting {
            font-size: 14px; font-weight: 500; color: var(--muted);
            margin-bottom: 8px; letter-spacing: 1px;
        }
        .welcome-user {
            font-size: 13px; color: var(--muted); margin-bottom: 16px;
        }
        .welcome-user strong {
            color: #ffffff; font-weight: 600;
            font-family: 'PixelChinese', 'Press Start 2P', monospace; font-size: 14px;
        }
        .switch-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 14px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08); background: transparent;
            color: var(--muted); font-size: 10px; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .switch-btn:hover {
            border-color: rgba(255,255,255,0.2); color: #a1a1aa;
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>
    <div class="dotgrid-bg" id="dotgridBg"><canvas id="dotgridCanvas"></canvas></div>

    <div class="hero-container">
        <div class="hero-title-wrap">
            <h1 class="hero-title" id="heroTitle"></h1>
            <h1 class="hero-title hero-title-sub" id="heroTitleSub"></h1>
        </div>

        <div class="hero-btn-wrap">
            <a href="login.html" class="hero-btn" id="heroBtn">Enter</a>
        </div>

        <div class="welcome-section" id="welcomeSection" style="display:none;">
            <div class="welcome-greeting">welcome back</div>
            <div class="welcome-user"><strong id="welcomeUsername"></strong></div>
            <button class="switch-btn" onclick="switchAccount()">switch account</button>
        </div>
    </div>

<script>
const USERS_KEY = 'wageClock_users';
const CURRENT_USER_KEY = 'wageClock_currentUser';

function getCurrentUser() { return sessionStorage.getItem(CURRENT_USER_KEY); }
function getUsers() {
    try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
    catch(e) { return {}; }
}
function switchAccount() {
    sessionStorage.removeItem(CURRENT_USER_KEY);
    window.location.href = 'login.html';
}

// ============ GREETING ============
function getGreeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return 'Good morning';
    if (h >= 12 && h < 18) return 'Good afternoon';
    return 'Good evening';
}

// ============ SHUFFLE TITLE ============
function shuffleTitle(text, containerId, size) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?<>{}[]#@';
    const chars = text.split('');
    const s = size || 26;
    const charW = s;
    const charH = Math.round(s * 1.4);
    const steps = 10;
    const wraps = [];

    chars.forEach(finalChar => {
        const wrap = document.createElement('span');
        wrap.className = 'shuffle-char-wrap';
        const w = finalChar === ' ' ? charW * 0.4 : charW;
        wrap.style.width = w + 'px';
        wrap.style.height = charH + 'px';

        const strip = document.createElement('span');
        strip.className = 'shuffle-char-strip';

        for (let s = 0; s < steps; s++) {
            const span = document.createElement('span');
            span.textContent = charset[Math.floor(Math.random() * charset.length)];
            span.style.height = charH + 'px';
            strip.appendChild(span);
        }
        const final = document.createElement('span');
        final.textContent = finalChar;
        final.style.height = charH + 'px';
        strip.appendChild(final);

        wrap.appendChild(strip);
        container.appendChild(wrap);
        wraps.push({ strip, steps });
    });

    wraps.forEach((w, i) => {
        const delay = i * 50 + Math.random() * 30;
        const duration = 380 + Math.random() * 120;
        const dist = -(w.steps * charH);
        w.strip.style.transition = 'none';
        w.strip.style.transform = 'translateY(0)';
        setTimeout(() => {
            w.strip.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.22, 0.61, 0.36, 1)';
            w.strip.style.transform = 'translateY(' + dist + 'px)';
        }, delay);
    });
}

// ============ DOTGRID ============
function initDotGrid() {
    const container = document.getElementById('dotgridBg');
    const canvas = document.getElementById('dotgridCanvas');
    const ctx = canvas.getContext('2d');

    class Grad { constructor(x,y,z){this.x=x;this.y=y;this.z=z;} dot2(x,y){return this.x*x+this.y*y;} }
    class Noise {
        constructor(seed=0){
            this.grad3=[new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];
            this.p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
            this.perm=new Array(512);this.gradP=new Array(512);this.seed(seed);
        }
        seed(seed){if(seed>0&&seed<1)seed*=65536;seed=Math.floor(seed);if(seed<256)seed|=seed<<8;for(let i=0;i<256;i++){let v=i&1?this.p[i]^(seed&255):this.p[i]^((seed>>8)&255);this.perm[i]=this.perm[i+256]=v;this.gradP[i]=this.gradP[i+256]=this.grad3[v%12];}}
        fade(t){return t*t*t*(t*(t*6-15)+10);}
        lerp(a,b,t){return(1-t)*a+t*b;}
        perlin2(x,y){let X=Math.floor(x),Y=Math.floor(y);x-=X;y-=Y;X&=255;Y&=255;const n00=this.gradP[X+this.perm[Y]].dot2(x,y);const n01=this.gradP[X+this.perm[Y+1]].dot2(x,y-1);const n10=this.gradP[X+1+this.perm[Y]].dot2(x-1,y);const n11=this.gradP[X+1+this.perm[Y+1]].dot2(x-1,y-1);const u=this.fade(x);return this.lerp(this.lerp(n00,n10,u),this.lerp(n01,n11,u),this.fade(y));}
    }

    const config = {
        waveSpeedX: 0.01, waveSpeedY: 0.004,
        waveAmpX: 48, waveAmpY: 24,
        xGap: 8, yGap: 28,
        friction: 0.93, tension: 0.005,
        maxCursorMove: 120
    };

    const noise = new Noise(Math.random());
    let lines = [];
    let bounding = { width:0, height:0 };
    const mouse = { x:-10, y:0, lx:0, ly:0, sx:0, sy:0, v:0, vs:0, a:0, set:false };

    function setSize() {
        const r = container.getBoundingClientRect();
        bounding.width = r.width; bounding.height = r.height;
        canvas.width = r.width; canvas.height = r.height;
    }
    function setLines() {
        const { width, height } = bounding;
        lines = [];
        const oW = width + 300, oH = height + 40;
        const totalLines = Math.ceil(oW / config.xGap);
        const totalPoints = Math.ceil(oH / config.yGap);
        const xS = (width - config.xGap * totalLines) / 2;
        const yS = (height - config.yGap * totalPoints) / 2;
        for (let i = 0; i <= totalLines; i++) {
            const pts = [];
            for (let j = 0; j <= totalPoints; j++) {
                pts.push({ x:xS+config.xGap*i, y:yS+config.yGap*j, wave:{x:0,y:0}, cursor:{x:0,y:0,vx:0,vy:0} });
            }
            lines.push(pts);
        }
    }
    function movePoints(time) {
        lines.forEach(pts => pts.forEach(p => {
            const m = noise.perlin2((p.x+time*config.waveSpeedX)*0.0015, (p.y+time*config.waveSpeedY)*0.0012)*12;
            p.wave.x = Math.cos(m) * config.waveAmpX;
            p.wave.y = Math.sin(m) * config.waveAmpY;
            const dx=p.x-mouse.sx, dy=p.y-mouse.sy;
            const dist=Math.hypot(dx,dy), l=Math.max(200, mouse.vs);
            if(dist<l){
                const s=1-dist/l;
                const f=Math.cos(dist*0.0008)*s;
                p.cursor.vx+=Math.cos(mouse.a)*f*l*mouse.vs*0.0005;
                p.cursor.vy+=Math.sin(mouse.a)*f*l*mouse.vs*0.0005;
            }
            p.cursor.vx+=(0-p.cursor.x)*config.tension;
            p.cursor.vy+=(0-p.cursor.y)*config.tension;
            p.cursor.vx*=config.friction;
            p.cursor.vy*=config.friction;
            p.cursor.x+=p.cursor.vx*2;
            p.cursor.y+=p.cursor.vy*2;
            p.cursor.x=Math.min(config.maxCursorMove,Math.max(-config.maxCursorMove,p.cursor.x));
            p.cursor.y=Math.min(config.maxCursorMove,Math.max(-config.maxCursorMove,p.cursor.y));
        }));
    }
    function moved(point, withCursor) {
        const x=point.x+point.wave.x+(withCursor!==false?point.cursor.x:0);
        const y=point.y+point.wave.y+(withCursor!==false?point.cursor.y:0);
        return {x:Math.round(x*10)/10, y:Math.round(y*10)/10};
    }
    function drawLines() {
        ctx.clearRect(0, 0, bounding.width, bounding.height);
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 2;
        lines.forEach(points => {
            let p1 = moved(points[0], false);
            ctx.moveTo(p1.x, p1.y);
            points.forEach((p, idx) => {
                const isLast = idx === points.length - 1;
                p1 = moved(p, !isLast);
                const p2 = moved(points[idx+1]||points[points.length-1], !isLast);
                ctx.lineTo(p1.x, p1.y);
                if (isLast) ctx.moveTo(p2.x, p2.y);
            });
        });
        ctx.stroke();
    }
    function tick(t) {
        mouse.sx+=(mouse.x-mouse.sx)*0.1;
        mouse.sy+=(mouse.y-mouse.sy)*0.1;
        const dx=mouse.x-mouse.lx, dy=mouse.y-mouse.ly;
        mouse.v=Math.hypot(dx,dy);
        mouse.vs+=(mouse.v-mouse.vs)*0.1;
        mouse.vs=Math.min(100,mouse.vs);
        mouse.lx=mouse.x; mouse.ly=mouse.y;
        mouse.a=Math.atan2(dy,dx);
        movePoints(t); drawLines();
        requestAnimationFrame(tick);
    }
    function onMouse(e) {
        const b=container.getBoundingClientRect();
        mouse.x=e.clientX-b.left; mouse.y=e.clientY-b.top;
        if(!mouse.set){mouse.sx=mouse.x;mouse.sy=mouse.y;mouse.lx=mouse.x;mouse.ly=mouse.y;mouse.set=true;}
    }
    setSize(); setLines();
    window.addEventListener('resize',()=>{setSize();setLines();});
    window.addEventListener('mousemove',onMouse);
    requestAnimationFrame(tick);
}

// ============ DOTGRID ============
function initDotGrid() {
    const container = document.getElementById('dotgridBg');
    const canvas = document.getElementById('dotgridCanvas');
    const ctx = canvas.getContext('2d');

    const dotSize = 3;
    const gap = 28;
    const proximity = 120;
    const resilience = 0.08;
    const friction = 0.88;
    let dots = [];
    let w = 0, h = 0;

    const pointer = { x: -999, y: -999, px: 0, py: 0, vx: 0, vy: 0 };

    function buildGrid() {
        const r = container.getBoundingClientRect();
        w = r.width; h = r.height;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const cell = dotSize + gap;
        const cols = Math.floor(w / cell);
        const rows = Math.floor(h / cell);
        const gW = cell * cols;
        const gH = cell * rows;
        const ox = (w - gW) / 2 + dotSize / 2;
        const oy = (h - gH) / 2 + dotSize / 2;

        dots = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                dots.push({ cx: ox + c * cell, cy: oy + r * cell, x: 0, y: 0, vx: 0, vy: 0 });
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        const proxSq = proximity * proximity;
        for (const d of dots) {
            const ox = d.cx + d.x, oy = d.cy + d.y;
            const dx = d.cx - pointer.x, dy = d.cy - pointer.y;
            const dsq = dx * dx + dy * dy;
            let a = 0.12;
            if (dsq < proxSq) {
                const t = 1 - Math.sqrt(dsq) / proximity;
                a = 0.12 + t * 0.45;
            }
            ctx.beginPath();
            ctx.arc(ox, oy, dotSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,' + a.toFixed(2) + ')';
            ctx.fill();
        }
    }

    function update() {
        const pvx = pointer.x - pointer.px;
        const pvy = pointer.y - pointer.py;
        pointer.vx += (pvx - pointer.vx) * 0.3;
        pointer.vy += (pvy - pointer.vy) * 0.3;
        pointer.px = pointer.x; pointer.py = pointer.y;
        const speed = Math.hypot(pointer.vx, pointer.vy);

        for (const d of dots) {
            const dx = d.cx - pointer.x, dy = d.cy - pointer.y;
            const dist = Math.hypot(dx, dy);
            if (dist < proximity && speed > 5) {
                const force = (1 - dist / proximity) * speed * 0.015;
                d.vx += (dx / dist) * force;
                d.vy += (dy / dist) * force;
            }
            d.vx += (0 - d.x) * resilience;
            d.vy += (0 - d.y) * resilience;
            d.vx *= friction; d.vy *= friction;
            d.x += d.vx; d.y += d.vy;
        }
    }

    function tick() { update(); draw(); requestAnimationFrame(tick); }

    function onMouse(e) {
        const r = container.getBoundingClientRect();
        pointer.x = e.clientX - r.left;
        pointer.y = e.clientY - r.top;
    }

    function onClick(e) {
        const r = container.getBoundingClientRect();
        const cx = e.clientX - r.left, cy = e.clientY - r.top;
        for (const d of dots) {
            const dist = Math.hypot(d.cx - cx, d.cy - cy);
            if (dist < 200) {
                const f = (1 - dist / 200) * 12;
                d.vx += (d.cx - cx) / dist * f;
                d.vy += (d.cy - cy) / dist * f;
            }
        }
    }

    buildGrid();
    window.addEventListener('resize', buildGrid);
    window.addEventListener('mousemove', onMouse, { passive: true });
    window.addEventListener('click', onClick);
    requestAnimationFrame(tick);
}

// ============ INIT ============
(function init() {
    const userId = getCurrentUser();
    if (userId && getUsers()[userId]) {
        document.getElementById('welcomeSection').style.display = 'block';
        document.getElementById('welcomeUsername').textContent = userId;
        document.getElementById('heroBtn').textContent = 'Enter';
        document.getElementById('heroBtn').href = 'clock.html';
    }
    initDotGrid();
    setTimeout(() => {
        shuffleTitle(getGreeting(), 'heroTitle');
        setTimeout(() => shuffleTitle('fellow worker', 'heroTitleSub', 18), 600);
    }, 400);
})();
</script>
</body>
</html>
