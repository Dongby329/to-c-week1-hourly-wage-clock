<!-- 时薪桌面钟 · Hero -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #111114;
            --border: #222228;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #f59e0b;
            --accent-soft: #fef3c7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Waves background */
        .waves-bg {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .waves-bg canvas {
            display: block; width: 100%; height: 100%;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
        }

        .hero-container {
            position: relative; z-index: 1;
            text-align: center; padding: 2rem;
            max-width: 480px; width: 100%;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 32px; font-weight: 700;
            letter-spacing: -0.5px; margin-bottom: 48px;
            background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block; white-space: nowrap;
        }
        /* Shuffle char wrappers */
        .shuffle-char-wrap {
            display: inline-block; overflow: hidden; vertical-align: bottom;
            position: relative;
        }
        .shuffle-char-strip {
            display: inline-flex; flex-direction: column;
            will-change: transform;
        }
        .shuffle-char-strip span {
            display: block; text-align: center; line-height: 1;
            background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Welcome section (logged-in users) */
        .welcome-section { margin-bottom: 48px; }
        .welcome-greeting {
            font-size: 18px; font-weight: 600; color: var(--text);
            margin-bottom: 6px; letter-spacing: -0.2px;
        }
        .welcome-user {
            font-size: 14px; color: var(--muted); margin-bottom: 14px;
        }
        .welcome-user strong { color: var(--accent); font-weight: 700; }
        .switch-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 11px; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .switch-btn:hover { border-color: #52525b; color: var(--text); background: rgba(255,255,255,0.03); }

        .hero-btn {
            display: inline-block;
            padding: 14px 48px;
            border-radius: 12px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
            font-family: inherit; text-decoration: none;
            border: none;
            background: #fafafa; color: #09090b;
            letter-spacing: 0.2px;
        }
        .hero-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(250,250,250,0.12);
        }
        .hero-btn:active { transform: translateY(0); }

    </style>
</head>
<body>
    <!-- Waves background -->
    <div class="waves-bg" id="wavesBg">
        <canvas id="wavesCanvas"></canvas>
    </div>
    <div class="hero-container">
        <h1 class="hero-title" id="heroTitle"></h1>
        <div>
            <a href="login.html" class="hero-btn" id="heroBtn">开始使用</a>
        </div>

        <!-- Logged-in: welcome area (below button) -->
        <div class="welcome-section" id="welcomeSection" style="display:none;">
            <div class="welcome-greeting">欢迎回来</div>
            <div class="welcome-user"><strong id="welcomeUsername"></strong></div>
            <button class="switch-btn" onclick="switchAccount()">⇄ 切换账号</button>
        </div>

    </div>
<script>
    const USERS_KEY = 'wageClock_users';
    const CURRENT_USER_KEY = 'wageClock_currentUser';

    function getCurrentUser() {
        return sessionStorage.getItem(CURRENT_USER_KEY);
    }
    function getUsers() {
        try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
        catch(e) { return {}; }
    }
    function switchAccount() {
        sessionStorage.removeItem(CURRENT_USER_KEY);
        window.location.href = 'login.html';
    }

    // ============ GREETING ============
    function getGreeting() {
        const h = new Date().getHours();
        if (h >= 5 && h < 12) return '早上好，打工人';
        if (h >= 12 && h < 18) return '下午好，打工人';
        return '晚上好，打工人';
    }

    // ============ SHUFFLE TITLE ANIMATION ============
    function shuffleTitle(text, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
        const chars = text.split('');
        const wraps = [];

        chars.forEach((finalChar, i) => {
            const wrap = document.createElement('span');
            wrap.className = 'shuffle-char-wrap';
            const w = finalChar === ' ' ? 12 : (finalChar.match(/[一-鿿]/) ? 32 : 18);
            wrap.style.width = w + 'px';
            wrap.style.height = '42px';

            const strip = document.createElement('span');
            strip.className = 'shuffle-char-strip';

            const steps = 8;
            for (let s = 0; s < steps; s++) {
                const span = document.createElement('span');
                span.textContent = charset[Math.floor(Math.random() * charset.length)];
                span.style.height = '42px';
                strip.appendChild(span);
            }
            const final = document.createElement('span');
            final.textContent = finalChar;
            final.style.height = '42px';
            strip.appendChild(final);

            wrap.appendChild(strip);
            container.appendChild(wrap);
            wraps.push({ strip, steps, wrap });
        });

        // Animate with stagger
        wraps.forEach((w, i) => {
            const delay = i * 60 + Math.random() * 40;
            const duration = 350 + Math.random() * 150;
            const dist = -(w.steps * 42);

            w.strip.style.transition = 'none';
            w.strip.style.transform = 'translateY(0)';

            setTimeout(() => {
                w.strip.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                w.strip.style.transform = 'translateY(' + dist + 'px)';
            }, delay);
        });
    }

    // ============ WAVES BACKGROUND (vanilla JS port from React Bits) ============
    function initWaves() {
        const container = document.getElementById('wavesBg');
        const canvas = document.getElementById('wavesCanvas');
        const ctx = canvas.getContext('2d');

        // --- Perlin Noise ---
        class Grad { constructor(x,y,z){this.x=x;this.y=y;this.z=z;} dot2(x,y){return this.x*x+this.y*y;} }
        class Noise {
            constructor(seed=0){
                this.grad3=[new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];
                this.p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
                this.perm=new Array(512);this.gradP=new Array(512);this.seed(seed);
            }
            seed(seed){if(seed>0&&seed<1)seed*=65536;seed=Math.floor(seed);if(seed<256)seed|=seed<<8;for(let i=0;i<256;i++){let v=i&1?this.p[i]^(seed&255):this.p[i]^((seed>>8)&255);this.perm[i]=this.perm[i+256]=v;this.gradP[i]=this.gradP[i+256]=this.grad3[v%12];}}
            fade(t){return t*t*t*(t*(t*6-15)+10);}
            lerp(a,b,t){return(1-t)*a+t*b;}
            perlin2(x,y){let X=Math.floor(x),Y=Math.floor(y);x-=X;y-=Y;X&=255;Y&=255;const n00=this.gradP[X+this.perm[Y]].dot2(x,y);const n01=this.gradP[X+this.perm[Y+1]].dot2(x,y-1);const n10=this.gradP[X+1+this.perm[Y]].dot2(x-1,y);const n11=this.gradP[X+1+this.perm[Y+1]].dot2(x-1,y-1);const u=this.fade(x);return this.lerp(this.lerp(n00,n10,u),this.lerp(n01,n11,u),this.fade(y));}
        }

        // --- Config ---
        const config = {
            lineColor: 'rgba(245,158,11,0.12)',
            waveSpeedX: 0.0125, waveSpeedY: 0.005,
            waveAmpX: 32, waveAmpY: 16,
            xGap: 12, yGap: 36,
            friction: 0.925, tension: 0.005,
            maxCursorMove: 100
        };

        const noise = new Noise(Math.random());
        let lines = [];
        let bounding = { width:0, height:0 };
        const mouse = { x:-10, y:0, lx:0, ly:0, sx:0, sy:0, v:0, vs:0, a:0, set:false };

        function setSize() {
            const r = container.getBoundingClientRect();
            bounding.width = r.width; bounding.height = r.height;
            canvas.width = r.width; canvas.height = r.height;
        }

        function setLines() {
            const { width, height } = bounding;
            lines = [];
            const oW = width + 200, oH = height + 30;
            const totalLines = Math.ceil(oW / config.xGap);
            const totalPoints = Math.ceil(oH / config.yGap);
            const xStart = (width - config.xGap * totalLines) / 2;
            const yStart = (height - config.yGap * totalPoints) / 2;
            for (let i = 0; i <= totalLines; i++) {
                const pts = [];
                for (let j = 0; j <= totalPoints; j++) {
                    pts.push({ x: xStart + config.xGap * i, y: yStart + config.yGap * j, wave:{x:0,y:0}, cursor:{x:0,y:0,vx:0,vy:0} });
                }
                lines.push(pts);
            }
        }

        function movePoints(time) {
            lines.forEach(pts => {
                pts.forEach(p => {
                    const move = noise.perlin2((p.x + time * config.waveSpeedX) * 0.002, (p.y + time * config.waveSpeedY) * 0.0015) * 12;
                    p.wave.x = Math.cos(move) * config.waveAmpX;
                    p.wave.y = Math.sin(move) * config.waveAmpY;
                    const dx = p.x - mouse.sx, dy = p.y - mouse.sy;
                    const dist = Math.hypot(dx, dy), l = Math.max(175, mouse.vs);
                    if (dist < l) {
                        const s = 1 - dist / l;
                        const f = Math.cos(dist * 0.001) * s;
                        p.cursor.vx += Math.cos(mouse.a) * f * l * mouse.vs * 0.00065;
                        p.cursor.vy += Math.sin(mouse.a) * f * l * mouse.vs * 0.00065;
                    }
                    p.cursor.vx += (0 - p.cursor.x) * config.tension;
                    p.cursor.vy += (0 - p.cursor.y) * config.tension;
                    p.cursor.vx *= config.friction;
                    p.cursor.vy *= config.friction;
                    p.cursor.x += p.cursor.vx * 2;
                    p.cursor.y += p.cursor.vy * 2;
                    p.cursor.x = Math.min(config.maxCursorMove, Math.max(-config.maxCursorMove, p.cursor.x));
                    p.cursor.y = Math.min(config.maxCursorMove, Math.max(-config.maxCursorMove, p.cursor.y));
                });
            });
        }

        function moved(point, withCursor) {
            const x = point.x + point.wave.x + (withCursor !== false ? point.cursor.x : 0);
            const y = point.y + point.wave.y + (withCursor !== false ? point.cursor.y : 0);
            return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
        }

        function drawLines() {
            ctx.clearRect(0, 0, bounding.width, bounding.height);
            ctx.beginPath();
            ctx.strokeStyle = config.lineColor;
            lines.forEach(points => {
                let p1 = moved(points[0], false);
                ctx.moveTo(p1.x, p1.y);
                points.forEach((p, idx) => {
                    const isLast = idx === points.length - 1;
                    p1 = moved(p, !isLast);
                    const p2 = moved(points[idx + 1] || points[points.length - 1], !isLast);
                    ctx.lineTo(p1.x, p1.y);
                    if (isLast) ctx.moveTo(p2.x, p2.y);
                });
            });
            ctx.stroke();
        }

        function tick(t) {
            mouse.sx += (mouse.x - mouse.sx) * 0.1;
            mouse.sy += (mouse.y - mouse.sy) * 0.1;
            const dx = mouse.x - mouse.lx, dy = mouse.y - mouse.ly;
            mouse.v = Math.hypot(dx, dy);
            mouse.vs += (mouse.v - mouse.vs) * 0.1;
            mouse.vs = Math.min(100, mouse.vs);
            mouse.lx = mouse.x; mouse.ly = mouse.y;
            mouse.a = Math.atan2(dy, dx);
            movePoints(t);
            drawLines();
            requestAnimationFrame(tick);
        }

        function onMouse(e) {
            const b = container.getBoundingClientRect();
            mouse.x = e.clientX - b.left;
            mouse.y = e.clientY - b.top;
            if (!mouse.set) { mouse.sx = mouse.x; mouse.sy = mouse.y; mouse.lx = mouse.x; mouse.ly = mouse.y; mouse.set = true; }
        }

        setSize(); setLines();
        window.addEventListener('resize', () => { setSize(); setLines(); });
        window.addEventListener('mousemove', onMouse);
        requestAnimationFrame(tick);
    }

    (function init() {
        const userId = getCurrentUser();
        if (userId && getUsers()[userId]) {
            // Logged in
            document.getElementById('welcomeSection').style.display = 'block';
            document.getElementById('welcomeUsername').textContent = userId;
            document.getElementById('heroBtn').textContent = '进入时钟';
            document.getElementById('heroBtn').href = 'clock.html';
        }
        // Trigger waves background + shuffle title
        initWaves();
        setTimeout(() => shuffleTitle(getGreeting(), 'heroTitle'), 300);
    })();
</script>
</body>
</html>
