<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时薪桌面钟</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root { --bg:#08080c;--surface:#0f0f13;--border:#1e1e24;--text:#ededef;--muted:#6b6b75; }

* { margin:0;padding:0;box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* DotGrid background */
.dotgrid-bg {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden; pointer-events: none;
}
.dotgrid-bg canvas {
  display: block; width: 100%; height: 100%;
  pointer-events: none;
}

/* Hero content */
.hero-container {
  position: relative; z-index: 1;
  text-align: center; padding: 3rem 1.5rem;
  max-width: 700px; width: 100%;
  animation: fadeUp 0.9s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Title */
.title-wrap { margin-bottom: 60px; }

.title-line {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 24px; font-weight: 400;
  color: #ffffff; letter-spacing: 2px;
  line-height: 1.8;
}

.title-sub {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 16px; font-weight: 400;
  color: rgba(255,255,255,0.5); letter-spacing: 3px;
  margin-top: 14px;
}

/* Shuffle strips */
.shuffle-wrap {
  display: inline-block; overflow: hidden;
  vertical-align: bottom;
}
.shuffle-strip {
  display: inline-flex; flex-direction: column;
  will-change: transform;
}
.shuffle-strip span {
  display: block; text-align: center;
  font-family: inherit; font-size: inherit; color: inherit;
  line-height: 1.6;
}

/* Button */
.btn-wrap { margin-bottom: 40px; }

.hero-btn {
  display: inline-block; padding: 12px 44px; border-radius: 4px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.25s; text-decoration: none;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent; color: #d4d4d8;
  letter-spacing: 1px; text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.hero-btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.4); color: #fff;
  box-shadow: 0 0 32px rgba(255,255,255,0.04);
}

/* Welcome */
.welcome-section { margin-top: 12px; display: none; }
.welcome-greeting { font-size: 13px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
.welcome-user { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.welcome-user strong {
  color: #fff; font-weight: 600;
  font-family: 'Press Start 2P', monospace; font-size: 11px;
}
.switch-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 14px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.08); background: transparent;
  color: var(--muted); font-size: 10px; cursor: pointer;
  transition: all 0.2s;
}
.switch-btn:hover {
  border-color: rgba(255,255,255,0.2); color: #a1a1aa;
  background: rgba(255,255,255,0.02);
}
</style>
</head>
<body>

<div class="dotgrid-bg" id="bg"><canvas id="bgCanvas"></canvas></div>

<div class="hero-container">
  <div class="title-wrap">
    <div class="title-line" id="titleLine"></div>
    <div class="title-sub" id="titleSub"></div>
  </div>

  <div class="btn-wrap">
    <a href="login.html" class="hero-btn" id="heroBtn">Enter</a>
  </div>

  <div class="welcome-section" id="welcomeSection">
    <div class="welcome-greeting">welcome back</div>
    <div class="welcome-user"><strong id="welcomeUsername"></strong></div>
    <button class="switch-btn" onclick="switchAccount()">switch account</button>
  </div>
</div>

<script>
// ===== AUTH =====
var UK = 'wageClock_users', CK = 'wageClock_currentUser';
function gU(){ try{ return JSON.parse(localStorage.getItem(UK))||{}; }catch(e){ return{}; } }
function gCU(){ return sessionStorage.getItem(CK); }
function switchAccount(){ sessionStorage.removeItem(CK); location.href='login.html'; }

// ===== GREETING =====
function getGreeting(){
  var h = new Date().getHours();
  if(h>=5&&h<12) return 'Good morning';
  if(h>=12&&h<18) return 'Good afternoon';
  return 'Good evening';
}

// ===== DOTGRID =====
document.addEventListener('DOMContentLoaded', function(){
  var c = document.getElementById('bg');
  var cv = document.getElementById('bgCanvas');
  var ctx = cv.getContext('2d');
  var ds = 3, gap = 28, prox = 120, res = 0.08, fric = 0.88;
  var dots = [], w = 0, h = 0;
  var ptr = {x:-999,y:-999,px:0,py:0,vx:0,vy:0};

  function build(){
    var r = c.getBoundingClientRect();
    w = r.width; h = r.height;
    var dpr = devicePixelRatio||1;
    cv.width = w*dpr; cv.height = h*dpr;
    cv.style.width = w+'px'; cv.style.height = h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);

    var cell = ds+gap;
    var cols = Math.floor(w/cell), rows = Math.floor(h/cell);
    var gW = cell*cols, gH = cell*rows;
    var ox = (w-gW)/2+ds/2, oy = (h-gH)/2+ds/2;
    dots = [];
    for(var r=0;r<rows;r++)
      for(var c=0;c<cols;c++)
        dots.push({cx:ox+c*cell,cy:oy+r*cell,x:0,y:0,vx:0,vy:0});
  }

  function draw(){
    ctx.clearRect(0,0,w,h);
    var psq = prox*prox;
    for(var i=0;i<dots.length;i++){
      var d = dots[i];
      var ox = d.cx+d.x, oy = d.cy+d.y;
      var dx = d.cx-ptr.x, dy = d.cy-ptr.y;
      var dsq = dx*dx+dy*dy;
      var a = 0.12;
      if(dsq<psq){ var t = 1-Math.sqrt(dsq)/prox; a = 0.12+t*0.45; }
      ctx.beginPath();
      ctx.arc(ox,oy,ds/2,0,Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+a.toFixed(2)+')';
      ctx.fill();
    }
  }

  function upd(){
    var pvx = ptr.x-ptr.px, pvy = ptr.y-ptr.py;
    ptr.vx += (pvx-ptr.vx)*0.3; ptr.vy += (pvy-ptr.vy)*0.3;
    ptr.px = ptr.x; ptr.py = ptr.y;
    var spd = Math.hypot(ptr.vx,ptr.vy);
    for(var i=0;i<dots.length;i++){
      var d = dots[i];
      var dx = d.cx-ptr.x, dy = d.cy-ptr.y;
      var dist = Math.hypot(dx,dy);
      if(dist<prox&&spd>5){ var f = (1-dist/prox)*spd*0.015; d.vx+=(dx/dist)*f; d.vy+=(dy/dist)*f; }
      d.vx += (0-d.x)*res; d.vy += (0-d.y)*res;
      d.vx *= fric; d.vy *= fric;
      d.x += d.vx; d.y += d.vy;
    }
  }

  function tick(){ upd(); draw(); requestAnimationFrame(tick); }

  function onMouse(e){
    var r = c.getBoundingClientRect();
    ptr.x = e.clientX-r.left; ptr.y = e.clientY-r.top;
  }

  function onClick(e){
    var r = c.getBoundingClientRect();
    var cx = e.clientX-r.left, cy = e.clientY-r.top;
    for(var i=0;i<dots.length;i++){
      var d = dots[i];
      var dist = Math.hypot(d.cx-cx,d.cy-cy);
      if(dist<200){ var f = (1-dist/200)*12; d.vx+=(d.cx-cx)/dist*f; d.vy+=(d.cy-cy)/dist*f; }
    }
  }

  build();
  window.addEventListener('resize', build);
  window.addEventListener('mousemove', onMouse, {passive:true});
  window.addEventListener('click', onClick);
  requestAnimationFrame(tick);
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function(){
  var userId = gCU();
  if(userId && gU()[userId]){
    document.getElementById('welcomeSection').style.display = 'block';
    document.getElementById('welcomeUsername').textContent = userId;
    document.getElementById('heroBtn').textContent = 'Enter';
    document.getElementById('heroBtn').href = 'clock.html';
  }

  document.getElementById('titleLine').textContent = getGreeting();
  document.getElementById('titleSub').textContent = 'fellow worker';
});
</script>
</body>
</html>
