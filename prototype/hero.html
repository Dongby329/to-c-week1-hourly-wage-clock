<!-- 时薪桌面钟 · Hero -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #111114;
            --border: #222228;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #f59e0b;
            --accent-soft: #fef3c7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Bill animation layer */
        .bills-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .bill {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            filter: blur(0.5px);
            animation: billFloat 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: var(--d);
        }
        @keyframes billFloat {
            0%   { transform: translateY(110vh) rotate(0deg) scale(0.6); opacity: 0; }
            30%  { opacity: 0.12; }
            70%  { transform: translateY(var(--y)) translateX(var(--x)) rotate(var(--r)) scale(1); opacity: 0.08; }
            100% { transform: translateY(var(--y)) translateX(var(--x)) rotate(calc(var(--r) + 360deg)) scale(1); opacity: 0.06; }
        }
        /* Continuous slow spin after arrival */
        .bill.spin {
            animation: billFloat 8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                       billSpin 12s linear infinite;
            animation-delay: var(--d), 8s;
        }
        @keyframes billSpin {
            from { transform: translateY(var(--y)) translateX(var(--x)) rotate(var(--r)) scale(1); }
            to   { transform: translateY(var(--y)) translateX(var(--x)) rotate(calc(var(--r) + 360deg)) scale(1); }
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
        }

        .hero-container {
            position: relative; z-index: 1;
            text-align: center; padding: 2rem;
            max-width: 480px; width: 100%;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 32px; font-weight: 700;
            letter-spacing: -0.5px; margin-bottom: 48px;
            background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block; white-space: nowrap;
        }
        /* Shuffle char wrappers */
        .shuffle-char-wrap {
            display: inline-block; overflow: hidden; vertical-align: bottom;
            position: relative;
        }
        .shuffle-char-strip {
            display: inline-flex; flex-direction: column;
            will-change: transform;
        }
        .shuffle-char-strip span {
            display: block; text-align: center; line-height: 1;
            background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Welcome section (logged-in users) */
        .welcome-section { margin-bottom: 48px; }
        .welcome-greeting {
            font-size: 18px; font-weight: 600; color: var(--text);
            margin-bottom: 6px; letter-spacing: -0.2px;
        }
        .welcome-user {
            font-size: 14px; color: var(--muted); margin-bottom: 14px;
        }
        .welcome-user strong { color: var(--accent); font-weight: 700; }
        .switch-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 11px; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .switch-btn:hover { border-color: #52525b; color: var(--text); background: rgba(255,255,255,0.03); }

        .hero-btn {
            display: inline-block;
            padding: 14px 48px;
            border-radius: 12px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
            font-family: inherit; text-decoration: none;
            border: none;
            background: #fafafa; color: #09090b;
            letter-spacing: 0.2px;
        }
        .hero-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(250,250,250,0.12);
        }
        .hero-btn:active { transform: translateY(0); }

    </style>
</head>
<body>
    <div class="bills-layer" id="billsLayer"></div>
    <div class="hero-container">
        <h1 class="hero-title" id="heroTitle"></h1>
        <div>
            <a href="login.html" class="hero-btn" id="heroBtn">开始使用</a>
        </div>

        <!-- Logged-in: welcome area (below button) -->
        <div class="welcome-section" id="welcomeSection" style="display:none;">
            <div class="welcome-greeting">欢迎回来</div>
            <div class="welcome-user"><strong id="welcomeUsername"></strong></div>
            <button class="switch-btn" onclick="switchAccount()">⇄ 切换账号</button>
        </div>

    </div>
<script>
    const USERS_KEY = 'wageClock_users';
    const CURRENT_USER_KEY = 'wageClock_currentUser';

    function getCurrentUser() {
        return sessionStorage.getItem(CURRENT_USER_KEY);
    }
    function getUsers() {
        try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
        catch(e) { return {}; }
    }
    function switchAccount() {
        sessionStorage.removeItem(CURRENT_USER_KEY);
        window.location.href = 'login.html';
    }

    // ============ GREETING ============
    function getGreeting() {
        const h = new Date().getHours();
        if (h >= 5 && h < 12) return '早上好，打工人';
        if (h >= 12 && h < 18) return '下午好，打工人';
        return '晚上好，打工人';
    }

    // ============ SHUFFLE TITLE ANIMATION ============
    function shuffleTitle(text, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
        const chars = text.split('');
        const wraps = [];

        chars.forEach((finalChar, i) => {
            const wrap = document.createElement('span');
            wrap.className = 'shuffle-char-wrap';
            const w = finalChar === ' ' ? 12 : (finalChar.match(/[一-鿿]/) ? 32 : 18);
            wrap.style.width = w + 'px';
            wrap.style.height = '42px';

            const strip = document.createElement('span');
            strip.className = 'shuffle-char-strip';

            const steps = 8;
            for (let s = 0; s < steps; s++) {
                const span = document.createElement('span');
                span.textContent = charset[Math.floor(Math.random() * charset.length)];
                span.style.height = '42px';
                strip.appendChild(span);
            }
            const final = document.createElement('span');
            final.textContent = finalChar;
            final.style.height = '42px';
            strip.appendChild(final);

            wrap.appendChild(strip);
            container.appendChild(wrap);
            wraps.push({ strip, steps, wrap });
        });

        // Animate with stagger
        wraps.forEach((w, i) => {
            const delay = i * 60 + Math.random() * 40;
            const duration = 350 + Math.random() * 150;
            const dist = -(w.steps * 42);

            w.strip.style.transition = 'none';
            w.strip.style.transform = 'translateY(0)';

            setTimeout(() => {
                w.strip.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                w.strip.style.transform = 'translateY(' + dist + 'px)';
            }, delay);
        });
    }

    // ============ BILL BACKGROUND ANIMATION ============
    function spawnBills() {
        const layer = document.getElementById('billsLayer');
        const bills = ['💵', '💴', '💶', '💷', '💰', '🪙'];
        const count = 18;

        for (let i = 0; i < count; i++) {
            const bill = document.createElement('span');
            bill.className = 'bill spin';
            bill.textContent = bills[i % bills.length];
            bill.style.setProperty('--d', (i * 0.3 + Math.random() * 0.5) + 's');
            bill.style.setProperty('--x', ((Math.random() - 0.5) * 60) + 'vw');
            bill.style.setProperty('--y', ((Math.random() - 0.5) * 30) + 'vh');
            bill.style.setProperty('--r', (Math.random() * 360) + 'deg');
            bill.style.left = (10 + Math.random() * 80) + '%';
            bill.style.fontSize = (24 + Math.random() * 48) + 'px';
            layer.appendChild(bill);
        }
    }

    (function init() {
        const userId = getCurrentUser();
        if (userId && getUsers()[userId]) {
            // Logged in
            document.getElementById('welcomeSection').style.display = 'block';
            document.getElementById('welcomeUsername').textContent = userId;
            document.getElementById('heroBtn').textContent = '进入时钟';
            document.getElementById('heroBtn').href = 'clock.html';
        }
        // Trigger background bills + shuffle title
        spawnBills();
        setTimeout(() => shuffleTitle(getGreeting(), 'heroTitle'), 300);
    })();
</script>
</body>
</html>
