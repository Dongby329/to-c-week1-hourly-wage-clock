<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收入日历 · 时薪桌面钟</title>
<meta name="theme-color" content="#08080c">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⏱</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<link rel="stylesheet" href="target-cursor.css">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
canvas { position:fixed;inset:0;z-index:0;pointer-events:none;display:block; }
body {
  background:#08080c;color:#ededef;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  perspective:800px;
}
main {
  position:relative;z-index:1;width:380px;padding:2rem 1.5rem;text-align:center;
  background:#0f0f13;border:1px solid #1a1a20;border-radius:16px;
  transform-style:preserve-3d;transition:transform 0.15s ease-out;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.mnav { display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px; }
.mnav button {
  width:28px;height:28px;border-radius:4px;border:1px solid rgba(255,255,255,0.06);
  background:transparent;color:#6b6b75;cursor:pointer;font-size:13px;transition:0.2s;
}
.mnav button:hover { border-color:rgba(255,255,255,0.2);color:#a1a1aa; }
.mnav .ml { font-family:'Courier New',monospace;font-size:14px;color:#fff;letter-spacing:1px;min-width:120px; }

.wrow { display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:2px; }
.wrow span { font-size:9px;color:#6b6b75;padding:3px 0; }
.grid { display:grid;grid-template-columns:repeat(7,1fr);gap:2px; }
.cell {
  aspect-ratio:1;border-radius:4px;padding:2px;text-align:center;
  border:1px solid transparent;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:11px;
}
.cell.today { border-color:rgba(245,158,11,0.2);background:rgba(245,158,11,0.04); }
.cell.has { border-color:rgba(52,211,153,0.06); }
.cell .cn { font-size:11px; }
.cell.we .cn { color:#a78bfa; }
.cell.ho .cn { color:#f59e0b; }
.cell .ca { font-size:8px;color:#34d399;margin-top:1px;font-family:'Courier New',monospace;font-weight:600; }
.cell .ca.z { color:#1e1e24; }

.summary { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;padding:14px;
  border:1px solid rgba(255,255,255,0.04);border-radius:6px; }
.summary .sv { font-size:18px;font-weight:600;font-family:'Courier New',monospace; }
.summary .sv.p { color:#34d399; }
.summary .sl { font-size:9px;color:#6b6b75;margin-top:2px;letter-spacing:1px;text-transform:uppercase; }

.custom-income { margin-top:14px;display:flex;gap:6px;align-items:center; }
.custom-income input {
  flex:1;padding:10px 12px;background:transparent;border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;color:#fff;font-size:14px;font-family:'Courier New',monospace;
  text-align:center;outline:none;transition:0.2s;
}
.custom-income input:focus { border-color:rgba(245,158,11,0.35); }
.custom-income input::placeholder { color:#3f3f46;font-size:12px; }
.custom-income button {
  padding:10px 16px;border-radius:6px;border:1px solid rgba(245,158,11,0.25);
  background:rgba(245,158,11,0.08);color:#f59e0b;font-size:11px;font-weight:600;
  cursor:pointer;font-family:inherit;letter-spacing:1px;white-space:nowrap;transition:0.2s;
}
.custom-income button:hover { background:rgba(245,158,11,0.16);border-color:rgba(245,158,11,0.4); }

.btn-export {
  display:block;width:100%;margin-top:10px;padding:8px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.04);background:transparent;color:#52525b;
  font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:0.2s;
}
.btn-export:hover { border-color:rgba(255,255,255,0.12);color:#a1a1aa; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<main>
  <div class="mnav">
    <button onclick="prev()" class="cursor-target">&#9664;</button>
    <span class="ml" id="ml">2026 June</span>
    <button onclick="next()" class="cursor-target">&#9654;</button>
  </div>

  <div class="wrow"><span data-i18n>M</span><span data-i18n>T</span><span data-i18n>W</span><span data-i18n>T</span><span data-i18n>F</span><span data-i18n>S</span><span data-i18n>S</span></div>
  <div class="grid" id="grid"></div>

  <div class="summary">
    <div><div class="sv p" id="sMonth">0</div><div class="sl" data-i18n>this month</div></div>
    <div><div class="sv" id="sTotal" style="color:#ededef;">0</div><div class="sl" data-i18n>all time</div></div>
  </div>

  <div class="custom-income">
    <input type="number" id="ciAmt" placeholder="Custom income…" data-i18n-placeholder min="0" step="0.01" class="cursor-target" onkeydown="if(event.key==='Enter')addCustom()">
    <button onclick="addCustom()" class="cursor-target" data-i18n>+ Add</button>
  </div>

  <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
</main>
<script src="nav.js"></script>
<script src="currency.js"></script>
<script src="i18n.js"></script>
<script src="target-cursor.js"></script>
<script>
var CU=sessionStorage.getItem('wageClock_currentUser');
if(!CU) location.href='hero.html';
function uk(k){return'wageClock_'+CU+'_'+k;}
function ld(k,d){try{var v=localStorage.getItem(uk(k));return v?JSON.parse(v):d;}catch(e){return d;}}

var earnings=ld('earnings',{});
var S=ld('settings',{workDaysOfWeek:[true,true,true,true,true,false,false]});
var HD={'2026-01-01':1,'2026-04-05':1,'2026-05-01':1,'2026-05-31':1,'2026-09-25':1,'2026-10-01':1};
var cy=new Date().getFullYear(),cm=new Date().getMonth();
var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Collect all earnings (from multiple keys)
var allEarnings={};
for(var i=0;i<localStorage.length;i++){
  var key=localStorage.key(i);
  if(key.indexOf(uk('earnings_'))===0){
    var ds=key.replace(uk('earnings_'),'');
    allEarnings[ds]=parseFloat(localStorage.getItem(key))||0;
  }
}

function render(){
  document.getElementById('ml').textContent=cy+' '+months[cm];
  var grid=document.getElementById('grid');grid.innerHTML='';
  var dim=new Date(cy,cm+1,0).getDate();
  var fd=new Date(cy,cm,1),so=fd.getDay()===0?6:fd.getDay()-1;
  var today=new Date().toISOString().slice(0,10);
  var mTotal=0,aTotal=0;

  for(var ds in allEarnings){
    aTotal+=allEarnings[ds];
    var d=new Date(ds);
    if(d.getFullYear()===cy&&d.getMonth()===cm)mTotal+=allEarnings[ds];
  }
  document.getElementById('sMonth').textContent=formatMoney(mTotal,0);
  document.getElementById('sTotal').textContent=formatMoney(aTotal,0);

  for(var i=0;i<so;i++){var c=document.createElement('div');c.className='cell';grid.appendChild(c);}
  for(var d=1;d<=dim;d++){
    var date=new Date(cy,cm,d),ds=date.toISOString().slice(0,10),dow=date.getDay();
    var idx=dow===0?6:dow-1,wd=S.workDaysOfWeek||[true,true,true,true,true,false,false];
    var cell=document.createElement('div');cell.className='cell';
    if(ds===today)cell.classList.add('today');
    if(allEarnings[ds])cell.classList.add('has');
    if(HD[ds])cell.classList.add('ho');else if(!wd[idx])cell.classList.add('we');
    var cn=document.createElement('div');cn.className='cn';
    cn.textContent=HD[ds]?d+' *':d;cell.appendChild(cn);
    var ca=document.createElement('div');ca.className='ca';
    if(allEarnings[ds])ca.textContent=formatMoney(allEarnings[ds],0);
    else if(date<=new Date()&&wd[idx]&&!HD[ds]){ca.className='ca z';ca.textContent='-';}
    cell.appendChild(ca);grid.appendChild(cell);
  }
}
function prev(){cm--;if(cm<0){cm=11;cy--;}render();}
function next(){cm++;if(cm>11){cm=0;cy++;}render();}

function exportCSV(){
  var keys = [];
  for(var i = 0; i < localStorage.length; i++){
    var key = localStorage.key(i);
    if(key.indexOf(uk('earnings_')) === 0) keys.push(key);
  }
  if(!keys.length) return;
  keys.sort();
  var csv = 'Date,Earnings\n';
  for(var j = 0; j < keys.length; j++){
    var ds = keys[j].replace(uk('earnings_'), '');
    var val = parseFloat(localStorage.getItem(keys[j])) || 0;
    csv += ds + ',' + val.toFixed(2) + '\n';
  }
  var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'wageclock_earnings_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function addCustom(){
  var amt = parseFloat(document.getElementById('ciAmt').value);
  if(!amt || amt <= 0) return;
  var today = new Date().toISOString().slice(0,10);
  var key = uk('earnings_' + today);
  var existing = parseFloat(localStorage.getItem(key)) || 0;
  localStorage.setItem(key, (existing + amt).toFixed(2));
  // Refresh allEarnings cache
  allEarnings[today] = existing + amt;
  document.getElementById('ciAmt').value = '';
  render();
}
render();

// DotGrid
(function(){
  var cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  var DS=3,G=28,P=120,RS=0.08,FR=0.88,W=0,H=0,dots=[];
  var pt={x:-999,y:-999,px:0,py:0,vx:0,vy:0};
  function build(){
    var r=cv.parentNode.getBoundingClientRect();W=r.width;H=r.height;
    var dpr=devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
    var cell=DS+G,cols=Math.floor(W/cell),rows=Math.floor(H/cell);
    var gW=cell*cols,gH=cell*rows,ox=(W-gW)/2+DS/2,oy=(H-gH)/2+DS/2;
    dots=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)dots.push({cx:ox+c*cell,cy:oy+r*cell,x:0,y:0,vx:0,vy:0});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);var psq=P*P;
    for(var i=0;i<dots.length;i++){
      var d=dots[i],ox=d.cx+d.x,oy=d.cy+d.y,dx=d.cx-pt.x,dy=d.cy-pt.y,dsq=dx*dx+dy*dy;
      var a=0.1;if(dsq<psq){var t=1-Math.sqrt(dsq)/P;a=0.1+t*0.45;}
      ctx.beginPath();ctx.arc(ox,oy,DS/2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.fill();
    }
  }
  function upd(){
    pt.vx+=(pt.x-pt.px-pt.vx)*0.3;pt.vy+=(pt.y-pt.py-pt.vy)*0.3;pt.px=pt.x;pt.py=pt.y;
    var spd=Math.hypot(pt.vx,pt.vy);
    for(var i=0;i<dots.length;i++){
      var d=dots[i],dx=d.cx-pt.x,dy=d.cy-pt.y,dist=Math.hypot(dx,dy);
      if(dist<P&&spd>5){var f=(1-dist/P)*spd*0.015;d.vx+=(dx/dist)*f;d.vy+=(dy/dist)*f;}
      d.vx+=(0-d.x)*RS;d.vy+=(0-d.y)*RS;d.vx*=FR;d.vy*=FR;d.x+=d.vx;d.y+=d.vy;
    }
  }
  function tick(){upd();draw();requestAnimationFrame(tick);}
  function mv(e){var r=cv.getBoundingClientRect();pt.x=e.clientX-r.left;pt.y=e.clientY-r.top;}
  function cl(e){var r=cv.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
    for(var i=0;i<dots.length;i++){var d=dots[i],dist=Math.hypot(d.cx-cx,d.cy-cy);
    if(dist<200){var f=(1-dist/200)*12;d.vx+=(d.cx-cx)/dist*f;d.vy+=(d.cy-cy)/dist*f;}}}
  setTimeout(function(){build();requestAnimationFrame(tick);},100);
  window.addEventListener('resize',build);window.addEventListener('mousemove',mv,{passive:true});window.addEventListener('click',cl);
})();

// 3D Tilt
var ccard=document.querySelector('main');
ccard.addEventListener('mousemove',function(e){
  var r=ccard.getBoundingClientRect();
  var x=(e.clientX-r.left)/r.width-0.5;
  var y=(e.clientY-r.top)/r.height-0.5;
  ccard.style.transform='rotateY('+(x*14)+'deg) rotateX('+(-y*14)+'deg)';
});
ccard.addEventListener('mouseleave',function(){
  ccard.style.transform='rotateY(0deg) rotateX(0deg)';
});

// Init PillNav
initPillNav({ active: 'calendar' });
initTargetCursor();

</script>
</body>
</html>
