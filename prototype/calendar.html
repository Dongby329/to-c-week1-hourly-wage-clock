<!-- 时薪桌面钟 · 收入日历 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入日历 · 时薪桌面钟</title>
    <style>
        :root { --bg:#09090b;--surface:#111114;--border:#222228;--text:#e4e4e7;--muted:#71717a;--accent:#f59e0b; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
            -webkit-font-smoothing:antialiased;
        }
        body::before { content:'';position:fixed;inset:0;pointer-events:none;
            background:radial-gradient(ellipse 50% 40% at 50% 45%,rgba(245,158,11,0.02) 0%,transparent 60%); }
        .cal-wrap { position:relative;z-index:1;width:400px;background:var(--surface);border:1px solid var(--border);
            border-radius:20px;padding:28px 24px 24px;animation:appear .5s cubic-bezier(.16,1,.3,1); }
        @keyframes appear { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .topbar { display:flex;justify-content:space-between;align-items:center;margin-bottom:24px; }
        .topbar .brand { font-size:13px;font-weight:600;color:var(--muted); }
        .topbar .btn { width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
            background:transparent;color:var(--muted);cursor:pointer;font-size:14px;
            display:flex;align-items:center;justify-content:center;transition:all .2s; }
        .topbar .btn:hover { background:rgba(255,255,255,.04);color:var(--text); }
        .month-nav { display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px; }
        .month-nav button { width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
            background:transparent;color:var(--muted);cursor:pointer;font-size:14px;transition:all .2s; }
        .month-nav button:hover { background:rgba(255,255,255,.04);color:var(--text); }
        .month-nav .mlabel { font-size:15px;font-weight:600;min-width:110px;text-align:center; }
        .wrow { display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px; }
        .wrow span { font-size:10px;color:var(--muted);padding:4px 0; }
        .wrow span.we { color:#a78bfa; }
        .grid { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
        .cell { aspect-ratio:1;border-radius:8px;padding:3px;text-align:center;border:1px solid transparent;
            display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s; }
        .cell:hover { background:rgba(255,255,255,.02); }
        .cell.today { border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.04); }
        .cell.has { border-color:rgba(52,211,153,.08); }
        .cnum { font-size:12px;font-weight:500; }
        .cell.we .cnum { color:#a78bfa; }
        .cell.ho .cnum { color:#f59e0b; }
        .camt { font-size:9px;font-weight:600;color:#34d399;margin-top:1px;font-family:"SF Mono","Consolas",monospace; }
        .camt.z { color:#27272a; }
        .summary { margin-top:20px;padding:16px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);
            border-radius:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px; }
        .sitem { text-align:center; }
        .sval { font-size:20px;font-weight:700;font-variant-numeric:tabular-nums; }
        .sval.p { color:#34d399; }
        .slbl { font-size:10px;color:var(--muted);margin-top:2px; }
        .legend { display:flex;gap:14px;justify-content:center;margin-top:10px; }
        .leg { display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted); }
        .ldot { width:6px;height:6px;border-radius:2px; }
        .ldot.w { background:#34d399; }
    </style>
</head>
<body>
<div class="cal-wrap">
    <div class="topbar">
        <span class="brand">📅 收入日历</span>
        <div style="display:flex;gap:4px;">
            <button class="btn" onclick="location.href='clock.html'" title="返回时钟">←</button>
            <button class="btn" onclick="location.href='setup.html'" title="设置">⚙</button>
        </div>
    </div>
    <div class="month-nav">
        <button onclick="prev()">◀</button><span class="mlabel" id="mlabel">2026年 6月</span><button onclick="next()">▶</button>
    </div>
    <div class="wrow"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="we">六</span><span class="we">日</span></div>
    <div class="grid" id="grid"></div>
    <div class="legend"><div class="leg"><div class="ldot w"></div>有收入</div></div>
    <div class="summary">
        <div class="sitem"><div class="sval p" id="sMonth">¥0.00</div><div class="slbl">本月收入</div></div>
        <div class="sitem"><div class="sval" id="sTotal" style="color:var(--text);">¥0.00</div><div class="slbl">历史总计</div></div>
    </div>
</div>
<script>
// Auth
const CU = sessionStorage.getItem('wageClock_currentUser');
if (!CU) { window.location.href = 'login.html'; }
function uk(k) { return 'wageClock_' + CU + '_' + k; }
function ld(k,d) { try { const v=localStorage.getItem(uk(k)); return v?JSON.parse(v):d; } catch(e) { return d; } }

const earnings = ld('earnings', {});
const settings = ld('settings', { workDaysOfWeek:[true,true,true,true,true,false,false] });
const holidayDB = { '2026-01-01':'元旦','2026-04-05':'清明节','2026-05-01':'劳动节','2026-05-31':'端午节','2026-09-25':'中秋节','2026-10-01':'国庆节' };
const makeupWorkdays = ['2026-02-14','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];
let cy = new Date().getFullYear(), cm = new Date().getMonth();

function render() {
    document.getElementById('mlabel').textContent = cy+'年 '+(cm+1)+'月';
    const grid = document.getElementById('grid'); grid.innerHTML = '';
    const dim = new Date(cy,cm+1,0).getDate();
    const fd = new Date(cy,cm,1), so = fd.getDay()===0?6:fd.getDay()-1;
    const today = new Date(), ts = today.toISOString().slice(0,10);
    let mTotal=0, aTotal=0;
    for (const [ds,amt] of Object.entries(earnings)) {
        aTotal+=amt; const d=new Date(ds); if(d.getFullYear()===cy&&d.getMonth()===cm) mTotal+=amt;
    }
    document.getElementById('sMonth').textContent='¥'+mTotal.toFixed(2);
    document.getElementById('sTotal').textContent='¥'+aTotal.toFixed(2);
    for (let i=0;i<so;i++) { const c=document.createElement('div'); c.className='cell'; grid.appendChild(c); }
    for (let d=1;d<=dim;d++) {
        const date=new Date(cy,cm,d), ds=date.toISOString().slice(0,10), dow=date.getDay();
        const idx=dow===0?6:dow-1; const wd=settings.workDaysOfWeek||[true,true,true,true,true,false,false];
        const cell=document.createElement('div'); cell.className='cell';
        if(ds===ts) cell.classList.add('today');
        if(earnings[ds]) cell.classList.add('has');
        if(holidayDB[ds]&&!makeupWorkdays.includes(ds)) cell.classList.add('ho');
        else if(!wd[idx]&&!makeupWorkdays.includes(ds)) cell.classList.add('we');
        const num=document.createElement('div'); num.className='cnum';
        num.textContent=holidayDB[ds]&&!makeupWorkdays.includes(ds)?d+' 🎌':(makeupWorkdays.includes(ds)?d+' 🔧':d);
        cell.appendChild(num);
        const amt=document.createElement('div'); amt.className='camt';
        if(earnings[ds]) amt.textContent='¥'+earnings[ds].toFixed(0);
        else if(date<=today&&wd[idx]&&!(holidayDB[ds]&&!makeupWorkdays.includes(ds))) { amt.className='camt z';amt.textContent='—'; }
        cell.appendChild(amt); grid.appendChild(cell);
    }
}
function prev(){cm--;if(cm<0){cm=11;cy--;}render();}
function next(){cm++;if(cm>11){cm=0;cy++;}render();}
render();
</script>
</body>
</html>
