<!--
📐 交互原型 - 非正式产品
时薪桌面钟 · 日历收入页面
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入日历 · 时薪桌面钟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0b1120; --card: #111827; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: #e2e8f0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .calendar-container {
            width: 420px; background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 28px 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .cal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .cal-header .title { font-size: 14px; font-weight: 600; color: #94a3b8; }
        .cal-header .back-btn {
            width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: all 0.2s; color: #94a3b8;
        }
        .cal-header .back-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }

        .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
        .month-nav button {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: #94a3b8; cursor: pointer; font-size: 16px; transition: all 0.2s;
        }
        .month-nav button:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
        .month-nav .month-label { font-size: 16px; font-weight: 600; min-width: 120px; text-align: center; }

        .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 6px; }
        .weekday-row span { font-size: 11px; color: #64748b; padding: 4px 0; }
        .weekday-row span.weekend { color: #7c3aed; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell {
            aspect-ratio: 1; border-radius: 10px; padding: 4px; text-align: center;
            border: 1px solid transparent; transition: all 0.2s; cursor: default; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .day-cell:hover { background: rgba(255,255,255,0.03); }
        .day-cell.empty { cursor: default; }
        .day-cell.today { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); }
        .day-cell.has-earning { border-color: rgba(16,185,129,0.15); }
        .day-num { font-size: 13px; font-weight: 500; }
        .day-cell.weekend .day-num { color: #7c3aed; }
        .day-cell.holiday .day-num { color: #f59e0b; }
        .day-amount {
            font-size: 10px; font-weight: 600; color: #34d399; margin-top: 1px;
            font-variant-numeric: tabular-nums; font-family: "SF Mono", "Consolas", monospace;
        }
        .day-amount.zero { color: #334155; }

        /* Summary */
        .summary-section {
            margin-top: 20px; padding: 16px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 14px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .summary-item { text-align: center; }
        .summary-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .summary-value.positive { color: #34d399; }
        .summary-label { font-size: 11px; color: #64748b; margin-top: 2px; }

        /* Legend */
        .legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #64748b; }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
        .legend-dot.work { background: #34d399; }
        .legend-dot.rest { background: #7c3aed; }
        .legend-dot.holiday { background: #f59e0b; }

        .nav-links { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .nav-link {
            padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02); color: #64748b; font-size: 11px;
            cursor: pointer; transition: all 0.2s; font-family: inherit; text-decoration: none;
        }
        .nav-link:hover { background: rgba(255,255,255,0.06); color: #94a3b8; }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="cal-header">
            <span class="title">📅 收入日历</span>
            <button class="back-btn" onclick="goBack()" title="返回时钟">←</button>
        </div>

        <div class="month-nav">
            <button onclick="prevMonth()">◀</button>
            <span class="month-label" id="monthLabel">2026年 6月</span>
            <button onclick="nextMonth()">▶</button>
        </div>

        <div class="weekday-row">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span>
            <span class="weekend">六</span><span class="weekend">日</span>
        </div>

        <div class="days-grid" id="daysGrid"></div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot work"></div> 有收入</div>
            <div class="legend-item"><div class="legend-dot rest"></div> 休息日</div>
            <div class="legend-item"><div class="legend-dot holiday"></div> 法定假日</div>
        </div>

        <div class="summary-section">
            <div class="summary-item">
                <div class="summary-value positive" id="sumMonth">¥0.00</div>
                <div class="summary-label">本月收入</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="sumTotal" style="color:#e2e8f0;">¥0.00</div>
                <div class="summary-label">历史总计</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="clock.html?state=auto" class="nav-link">⏳ 返回时钟</a>
            <a href="setup.html" class="nav-link">⚙ 修改设置</a>
            <a href="index.html" class="nav-link">🏠 原型首页</a>
        </div>
    </div>

    <script>
        // --- Simulated earnings data (in real app, from localStorage) ---
        function getEarningsData() {
            try {
                const stored = localStorage.getItem('wageClock_earnings');
                if (stored) return JSON.parse(stored);
            } catch(e) {}
            // Generate sample data for prototype
            const data = {};
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const settings = (() => {
                try { const s = sessionStorage.getItem('wageClockSettings'); if (s) return JSON.parse(s); } catch(e) {}
                return { dailySalary: 681.82, workDaysOfWeek: [true,true,true,true,true,false,false] };
            })();
            const holidayDB = {
                '2026-01-01':'元旦','2026-04-05':'清明节','2026-05-01':'劳动节','2026-05-31':'端午节',
                '2026-09-25':'中秋节','2026-10-01':'国庆节',
            };
            const makeupWorkdays = ['2026-02-14','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];

            // Generate for current month
            const daysInMonth = new Date(year, month+1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const ds = date.toISOString().slice(0,10);
                const dow = date.getDay();
                // Skip weekends
                const idx = dow===0?6:dow-1;
                const wd = settings.workDaysOfWeek || [true,true,true,true,true,false,false];
                if (!wd[idx] && !makeupWorkdays.includes(ds)) continue;
                if (holidayDB[ds] && !makeupWorkdays.includes(ds)) continue;
                // Skip future dates
                if (date > now) continue;
                // Add small random variation
                const variation = 0.95 + Math.random() * 0.1;
                data[ds] = Math.round(settings.dailySalary * variation * 100) / 100;
            }
            // Also add some past months
            for (let m = 0; m < month; m++) {
                const dim = new Date(year, m+1, 0).getDate();
                for (let d = 1; d <= dim; d++) {
                    const date = new Date(year, m, d);
                    const ds = date.toISOString().slice(0,10);
                    const dow = date.getDay();
                    const idx = dow===0?6:dow-1;
                    const wd = settings.workDaysOfWeek || [true,true,true,true,true,false,false];
                    if (!wd[idx] && !makeupWorkdays.includes(ds)) continue;
                    if (holidayDB[ds] && !makeupWorkdays.includes(ds)) continue;
                    const variation = 0.93 + Math.random() * 0.14;
                    data[ds] = Math.round(settings.dailySalary * variation * 100) / 100;
                }
            }
            // Save for next time
            try { localStorage.setItem('wageClock_earnings', JSON.stringify(data)); } catch(e) {}
            return data;
        }

        const earningsData = getEarningsData();
        const holidayDB = {
            '2026-01-01':'元旦','2026-04-05':'清明节','2026-05-01':'劳动节','2026-05-31':'端午节',
            '2026-09-25':'中秋节','2026-10-01':'国庆节',
        };
        const makeupWorkdays = ['2026-02-14','2026-04-26','2026-05-09','2026-09-20','2026-09-27','2026-10-10'];

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-based

        function renderCalendar() {
            document.getElementById('monthLabel').textContent = currentYear + '年 ' + (currentMonth+1) + '月';
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1);
            const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
            const startDow = firstDay.getDay(); // 0=Sun
            const startOffset = startDow === 0 ? 6 : startDow - 1; // Mon=0

            const today = new Date();
            const todayStr = today.toISOString().slice(0,10);

            let monthTotal = 0;
            let allTotal = 0;

            // Calculate totals
            for (const [ds, amt] of Object.entries(earningsData)) {
                allTotal += amt;
                const d = new Date(ds);
                if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
                    monthTotal += amt;
                }
            }
            document.getElementById('sumMonth').textContent = '¥' + monthTotal.toFixed(2);
            document.getElementById('sumTotal').textContent = '¥' + allTotal.toFixed(2);

            // Empty cells before first day
            for (let i = 0; i < startOffset; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell empty';
                grid.appendChild(cell);
            }

            // Day cells
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(currentYear, currentMonth, d);
                const ds = date.toISOString().slice(0,10);
                const dow = date.getDay();
                const idx = dow===0?6:dow-1;

                const cell = document.createElement('div');
                cell.className = 'day-cell';

                // Check if today
                if (ds === todayStr) cell.classList.add('today');

                // Check weekend
                const settings = (() => {
                    try { const s = sessionStorage.getItem('wageClockSettings'); if (s) return JSON.parse(s); } catch(e) {}
                    return { workDaysOfWeek: [true,true,true,true,true,false,false] };
                })();
                const wd = settings.workDaysOfWeek || [true,true,true,true,true,false,false];

                if (holidayDB[ds] && !makeupWorkdays.includes(ds)) {
                    cell.classList.add('holiday');
                } else if (!wd[idx] && !makeupWorkdays.includes(ds)) {
                    cell.classList.add('weekend');
                }

                const numSpan = document.createElement('div');
                numSpan.className = 'day-num';
                numSpan.textContent = d;

                // Holiday label
                if (holidayDB[ds] && !makeupWorkdays.includes(ds)) {
                    numSpan.textContent = d + ' 🎌';
                } else if (makeupWorkdays.includes(ds)) {
                    numSpan.textContent = d + ' 🔧';
                }

                cell.appendChild(numSpan);

                // Earnings amount
                const amtSpan = document.createElement('div');
                if (earningsData[ds]) {
                    amtSpan.className = 'day-amount';
                    amtSpan.textContent = '¥' + earningsData[ds].toFixed(0);
                    cell.classList.add('has-earning');
                } else if (date <= today && wd[idx] && !(holidayDB[ds] && !makeupWorkdays.includes(ds))) {
                    amtSpan.className = 'day-amount zero';
                    amtSpan.textContent = '—';
                } else {
                    amtSpan.className = 'day-amount zero';
                    amtSpan.textContent = '';
                }
                cell.appendChild(amtSpan);

                grid.appendChild(cell);
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }
        function goBack() { window.location.href = 'clock.html?state=auto'; }

        renderCalendar();
    </script>
</body>
</html>
