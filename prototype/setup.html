<!--
📐 交互原型 - 非正式产品
时薪桌面钟 · 设置向导（3步）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置向导 · 时薪桌面钟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .step-dot { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-in { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        input[type=range] { accent-color: #6366f1; }
        input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .day-btn.work-day { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: #34d399; }
        .day-btn.rest-day { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.06); color: #475569; }
        .schedule-btn.active-schedule { background: rgba(99,102,241,0.2) !important; border-color: rgba(99,102,241,0.5) !important; color: #a5b4fc !important; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full p-6">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="text-3xl mb-2">⏳</div>
            <h1 class="text-xl font-bold">时薪桌面钟</h1>
            <p class="text-slate-400 text-sm mt-1">快速设置，开始感知时间的价值</p>
        </div>

        <!-- Step Indicator -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div id="dot1" class="step-dot w-3 h-3 rounded-full bg-indigo-500 ring-2 ring-indigo-400/50"></div>
            <div class="w-8 h-0.5 bg-slate-700 transition-colors duration-400" id="line1"></div>
            <div id="dot2" class="step-dot w-3 h-3 rounded-full bg-slate-700"></div>
            <div class="w-8 h-0.5 bg-slate-700 transition-colors duration-400" id="line2"></div>
            <div id="dot3" class="step-dot w-3 h-3 rounded-full bg-slate-700"></div>
        </div>
        <p class="text-center text-xs text-slate-500 mb-6" id="stepLabel">步骤 1/3</p>

        <!-- Step 1: Monthly Salary -->
        <div id="step1" class="slide-in">
            <div class="text-center mb-6">
                <div class="text-4xl mb-3">💰</div>
                <h2 class="text-lg font-semibold mb-1">你的月薪是多少？</h2>
                <p class="text-slate-400 text-sm">税前税后都可以，这是给你自己看的</p>
            </div>
            <div class="relative mb-6">
                <input type="number" id="salary" value="15000"
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-4 text-center text-3xl font-bold text-white focus:outline-none focus:border-indigo-500 transition"
                    placeholder="输入月薪">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">元</span>
            </div>
            <!-- Quick Select -->
            <div class="flex gap-2 justify-center flex-wrap">
                <button onclick="setSalary(5000)" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">5k</button>
                <button onclick="setSalary(8000)" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">8k</button>
                <button onclick="setSalary(15000)" class="px-3 py-1.5 bg-indigo-500/20 border border-indigo-500/40 rounded-lg text-sm text-indigo-300 transition">15k</button>
                <button onclick="setSalary(25000)" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">25k</button>
                <button onclick="setSalary(40000)" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">40k</button>
            </div>
            <button onclick="nextStep(1)" class="w-full mt-8 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition">
                下一步 →
            </button>
        </div>

        <!-- Step 2: Working Days + Rest Days -->
        <div id="step2" class="hidden">
            <div class="text-center mb-6">
                <div class="text-4xl mb-3">📅</div>
                <h2 class="text-lg font-semibold mb-1">工作制和休息日</h2>
                <p class="text-slate-400 text-sm">选择你的工作制，自动匹配每月工作天数</p>
            </div>

            <!-- Work schedule quick select -->
            <div class="flex gap-2 justify-center mb-5">
                <button id="btnDual" onclick="setSchedule('dual')" class="schedule-btn px-4 py-2 bg-indigo-500/20 border border-indigo-500/40 rounded-lg text-sm text-indigo-300 transition">双休</button>
                <button id="btnAlternating" onclick="setSchedule('alternating')" class="schedule-btn px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">大小周</button>
                <button id="btnSingle" onclick="setSchedule('single')" class="schedule-btn px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">单休</button>
            </div>

            <!-- Day-of-week toggles -->
            <p class="text-xs text-slate-500 text-center mb-2">点击切换：<span class="text-emerald-400">工作日</span> / <span class="text-slate-600">休息日</span></p>
            <div class="flex gap-1.5 justify-center mb-4" id="weekdayToggles">
                <button onclick="toggleDay(0)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="0">一</button>
                <button onclick="toggleDay(1)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="1">二</button>
                <button onclick="toggleDay(2)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="2">三</button>
                <button onclick="toggleDay(3)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="3">四</button>
                <button onclick="toggleDay(4)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="4">五</button>
                <button onclick="toggleDay(5)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="5">六</button>
                <button onclick="toggleDay(6)" class="day-btn w-10 h-10 rounded-lg text-xs font-semibold border transition" data-day="6">日</button>
            </div>

            <!-- 大小周额外设置 -->
            <div id="alternatingExtra" class="hidden mb-4 p-3 bg-slate-800/40 border border-slate-700/50 rounded-lg text-center">
                <p class="text-xs text-slate-400 mb-2">大小周：本周六是工作日吗？</p>
                <div class="flex gap-2 justify-center">
                    <button id="btnSatWork" onclick="setSatWork(true)" class="px-4 py-1.5 bg-indigo-500/20 border border-indigo-500/40 rounded-lg text-sm text-indigo-300 transition">是，本周六上班</button>
                    <button id="btnSatRest" onclick="setSatWork(false)" class="px-4 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">不，本周六休息</button>
                </div>
                <p class="text-xs text-slate-500 mt-2">大小周自动交替，只需确认本周状态</p>
            </div>

            <!-- Working days display (auto-calculated) -->
            <div class="relative mb-3">
                <label class="block text-xs text-slate-500 text-center mb-1">每月约工作</label>
                <input type="number" id="workDays" value="22" min="1" max="31"
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-center text-3xl font-bold text-white focus:outline-none focus:border-indigo-500 transition"
                    placeholder="输入天数" readonly>
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg mt-2">天/月</span>
            </div>
            <p class="text-xs text-slate-500 text-center mb-0" id="workDaysHint">双休制：5天/周 × 4.33周 ≈ 22天</p>

            <div class="flex gap-3 mt-6">
                <button onclick="prevStep(2)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-3 rounded-xl transition">
                    ← 上一步
                </button>
                <button onclick="nextStep(2)" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition">
                    下一步 →
                </button>
            </div>
        </div>

        <!-- Step 3: Work Time Range -->
        <div id="step3" class="hidden">
            <div class="text-center mb-6">
                <div class="text-4xl mb-3">🕐</div>
                <h2 class="text-lg font-semibold mb-1">每天几点到几点上班？</h2>
                <p class="text-slate-400 text-sm">午休时间暂时算在工作时间内</p>
            </div>
            <div class="flex items-center gap-4 mb-6">
                <div class="flex-1">
                    <label class="block text-xs text-slate-400 mb-2 text-center">上班时间</label>
                    <input type="time" id="startTime" value="09:00"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3 text-center text-xl font-bold text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div class="text-slate-500 text-xl pt-5">→</div>
                <div class="flex-1">
                    <label class="block text-xs text-slate-400 mb-2 text-center">下班时间</label>
                    <input type="time" id="endTime" value="18:00"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3 text-center text-xl font-bold text-white focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>
            <!-- Preview -->
            <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 text-center">
                <p class="text-xs text-slate-500 mb-1">预览</p>
                <p class="text-slate-300 text-sm">
                    每日 <span id="previewHours" class="text-white font-semibold">9</span> 小时 ·
                    每日薪资 <span id="previewDaily" class="text-white font-semibold">681.82</span> 元 ·
                    每秒 <span id="previewPerSec" class="text-emerald-400 font-semibold">0.0237</span> 元
                </p>
            </div>
            <!-- Overtime rate -->
            <div class="mt-5 p-4 bg-slate-800/30 border border-slate-700/40 rounded-xl">
                <label class="block text-xs text-slate-400 text-center mb-3">🔥 加班计费方式</label>
                <!-- OT mode selector -->
                <div class="flex gap-1 justify-center mb-3">
                    <button onclick="setOTMode('rate')" id="otModeRate" class="ot-mode-btn px-3 py-1.5 bg-red-500/15 border border-red-500/30 rounded-lg text-xs text-red-300 transition active-sub">按倍率</button>
                    <button onclick="setOTMode('persecond')" id="otModePerSec" class="ot-mode-btn px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs text-slate-300 hover:border-slate-500 transition">按秒薪</button>
                    <button onclick="setOTMode('custom')" id="otModeCustom" class="ot-mode-btn px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs text-slate-300 hover:border-slate-500 transition">自定义</button>
                </div>
                <!-- Multiplier sub-options -->
                <div id="otMultiplierRow" class="flex gap-2 justify-center mb-2">
                    <button onclick="setOTMultiplier(1.0)" id="otMul1" class="ot-mul-btn px-3 py-1 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">×1.0</button>
                    <button onclick="setOTMultiplier(1.5)" id="otMul15" class="ot-mul-btn px-3 py-1 bg-red-500/15 border border-red-500/30 rounded-lg text-sm text-red-300 transition active-sub">×1.5</button>
                    <button onclick="setOTMultiplier(2.0)" id="otMul2" class="ot-mul-btn px-3 py-1 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">×2.0</button>
                    <button onclick="setOTMultiplier(3.0)" id="otMul3" class="ot-mul-btn px-3 py-1 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-slate-500 transition">×3.0</button>
                </div>
                <!-- Custom amount sub-options -->
                <div id="otCustomRow" class="hidden">
                    <div class="flex items-center gap-2 justify-center mb-2">
                        <input type="number" id="otCustomAmount" value="50" min="0" step="0.01"
                            class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-center text-white text-sm focus:outline-none focus:border-red-500 transition">
                        <span class="text-slate-400 text-xs">元</span>
                        <button onclick="toggleOTCustomUnit()" id="otCustomUnitBtn"
                            class="px-2 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs text-slate-300 hover:border-slate-500 transition">
                            /秒
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 text-center" id="otCustomHint">加班每秒 +50.00 元</p>
                </div>
                <!-- Formula placeholder (future) -->
                <p class="text-xs text-slate-600 text-center mt-2">💡 后续可添加自定义计算公式（如：基本×1.5+餐补）</p>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="prevStep(3)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-3 rounded-xl transition">
                    ← 上一步
                </button>
                <button onclick="finishSetup()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition">
                    ✅ 完成设置
                </button>
            </div>
        </div>

        <!-- Validation Error Toast -->
        <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-4 py-2 rounded-lg text-sm hidden transition-all">
            <span id="toastMsg"></span>
        </div>
    </div>

    <script>
        let currentStep = 1;
        // 0=Mon, 1=Tue, ..., 6=Sun. true = work day
        let workDaysOfWeek = [true, true, true, true, true, false, false]; // default: 双休
        let scheduleType = 'dual'; // 'dual' | 'alternating' | 'single'
        let satWorkThisWeek = false; // for 大小周
        let overtimeSettings = {
            mode: 'rate',        // 'rate' | 'persecond' | 'custom'
            multiplier: 1.5,
            customAmount: 50,
            customUnit: 'second' // 'second' | 'once'
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.remove('hidden'); t.style.opacity = '1';
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.classList.add('hidden'), 200); }, 2000);
        }

        function updateDots(step) {
            const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];
            const lines = [document.getElementById('line1'), document.getElementById('line2')];
            dots.forEach((d, i) => {
                if (i < step) d.className = 'step-dot w-3 h-3 rounded-full bg-indigo-500 ring-2 ring-indigo-400/50';
                else d.className = 'step-dot w-3 h-3 rounded-full bg-slate-700';
            });
            lines.forEach((l, i) => { l.className = `w-8 h-0.5 transition-colors duration-400 ${i < step - 1 ? 'bg-indigo-500' : 'bg-slate-700'}`; });
            document.getElementById('stepLabel').textContent = `步骤 ${step}/3`;
        }

        // --- Day toggle ---
        function toggleDay(day) {
            workDaysOfWeek[day] = !workDaysOfWeek[day];
            updateDayButtons();
            updateWorkDaysFromSelection();
        }

        function updateDayButtons() {
            const btns = document.querySelectorAll('.day-btn');
            btns.forEach((btn, i) => {
                btn.classList.remove('work-day', 'rest-day');
                btn.classList.add(workDaysOfWeek[i] ? 'work-day' : 'rest-day');
            });
        }

        function updateWorkDaysFromSelection() {
            const workCount = workDaysOfWeek.filter(Boolean).length;
            const monthlyDays = Math.round(workCount * 4.33);
            document.getElementById('workDays').value = monthlyDays;
            const hint = `${workCount}天/周 × 4.33周 ≈ ${monthlyDays}天/月`;
            document.getElementById('workDaysHint').textContent = hint;
            updatePreview();
        }

        // --- Schedule quick select ---
        function setSchedule(type) {
            scheduleType = type;
            // Update schedule buttons
            document.querySelectorAll('.schedule-btn').forEach(b => b.classList.remove('active-schedule'));
            const btnMap = { dual:'btnDual', alternating:'btnAlternating', single:'btnSingle' };
            document.getElementById(btnMap[type]).classList.add('active-schedule');

            const extra = document.getElementById('alternatingExtra');

            if (type === 'dual') {
                workDaysOfWeek = [true, true, true, true, true, false, false];
                extra.classList.add('hidden');
            } else if (type === 'single') {
                workDaysOfWeek = [true, true, true, true, true, true, false];
                extra.classList.add('hidden');
            } else if (type === 'alternating') {
                workDaysOfWeek = [true, true, true, true, true, satWorkThisWeek, false];
                extra.classList.remove('hidden');
                updateSatButtons();
            }
            updateDayButtons();
            updateWorkDaysFromSelection();
        }

        function setSatWork(work) {
            satWorkThisWeek = work;
            workDaysOfWeek[5] = work;
            updateDayButtons();
            updateWorkDaysFromSelection();
            updateSatButtons();
        }

        function updateSatButtons() {
            const btnW = document.getElementById('btnSatWork');
            const btnR = document.getElementById('btnSatRest');
            btnW.classList.remove('active-schedule'); btnR.classList.remove('active-schedule');
            if (satWorkThisWeek) btnW.classList.add('active-schedule');
            else btnR.classList.add('active-schedule');
        }

        function setOTMode(mode) {
            overtimeSettings.mode = mode;
            document.querySelectorAll('.ot-mode-btn').forEach(b => b.classList.remove('active-sub'));
            const modeMap = {rate:'otModeRate', persecond:'otModePerSec', custom:'otModeCustom'};
            if (modeMap[mode]) document.getElementById(modeMap[mode]).classList.add('active-sub');

            document.getElementById('otMultiplierRow').classList.toggle('hidden', mode !== 'rate');
            document.getElementById('otCustomRow').classList.toggle('hidden', mode !== 'custom');

            if (mode === 'persecond') {
                overtimeSettings.multiplier = 1.0;
            }
            updateOTPreview();
        }
        function setOTMultiplier(mult) {
            overtimeSettings.multiplier = mult;
            document.querySelectorAll('.ot-mul-btn').forEach(b => b.classList.remove('active-sub'));
            const mulMap = {1.0:'otMul1', 1.5:'otMul15', 2.0:'otMul2', 3.0:'otMul3'};
            if (mulMap[mult]) document.getElementById(mulMap[mult]).classList.add('active-sub');
        }
        function toggleOTCustomUnit() {
            overtimeSettings.customUnit = overtimeSettings.customUnit === 'second' ? 'once' : 'second';
            document.getElementById('otCustomUnitBtn').textContent = overtimeSettings.customUnit === 'second' ? '/秒' : '/次';
            updateOTPreview();
        }
        function updateOTPreview() {
            const hint = document.getElementById('otCustomHint');
            const amt = parseFloat(document.getElementById('otCustomAmount').value) || 0;
            if (overtimeSettings.customUnit === 'second') {
                hint.textContent = '加班每秒 +' + amt.toFixed(2) + ' 元';
            } else {
                hint.textContent = '单次加班费用 ¥' + amt.toFixed(2);
            }
        }
        // Bind custom amount input
        document.addEventListener('DOMContentLoaded', function() {
            const customAmt = document.getElementById('otCustomAmount');
            if (customAmt) customAmt.addEventListener('input', function() {
                overtimeSettings.customAmount = parseFloat(this.value) || 0;
                updateOTPreview();
            });
        });

        // --- Step 3 preview ---
        function updatePreview() {
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const days = parseInt(document.getElementById('workDays').value) || 1;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (start && end) {
                const [sh, sm] = start.split(':').map(Number);
                const [eh, em] = end.split(':').map(Number);
                const hours = eh - sh + (em - sm) / 60;
                if (hours > 0) {
                    const daily = salary / days;
                    const perSec = daily / hours / 3600;
                    document.getElementById('previewHours').textContent = hours;
                    document.getElementById('previewDaily').textContent = daily.toFixed(2);
                    document.getElementById('previewPerSec').textContent = perSec.toFixed(4);
                }
            }
        }

        function setSalary(val) { document.getElementById('salary').value = val; updatePreview(); }

        function nextStep(from) {
            if (from === 1) {
                const v = parseFloat(document.getElementById('salary').value);
                if (!v || v <= 0) { showToast('请输入有效的月薪'); return; }
                currentStep = 2;
            } else if (from === 2) {
                const v = parseInt(document.getElementById('workDays').value);
                if (!v || v < 1 || v > 31) { showToast('请输入有效的工作天数'); return; }
                if (!workDaysOfWeek.some(Boolean)) { showToast('请至少选择一天为工作日'); return; }
                currentStep = 3;
                updatePreview();
            }
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step' + currentStep).classList.remove('hidden');
            document.getElementById('step' + currentStep).classList.add('slide-in');
            updateDots(currentStep);
        }

        function prevStep(from) {
            currentStep = from - 1;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step' + currentStep).classList.remove('hidden');
            document.getElementById('step' + currentStep).classList.add('slide-in');
            updateDots(currentStep);
        }

        function finishSetup() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (!start || !end) { showToast('请选择上下班时间'); return; }
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            if (eh * 60 + em <= sh * 60 + sm) { showToast('下班时间必须晚于上班时间'); return; }

            // Save settings to sessionStorage for clock.html to read
            const salary = parseFloat(document.getElementById('salary').value);
            const days = parseInt(document.getElementById('workDays').value);
            const hours = eh - sh + (em - sm) / 60;
            const settings = {
                monthlySalary: salary,
                workingDays: days,
                workStart: start,
                workEnd: end,
                dailySalary: salary / days,
                perSecondRate: (salary / days) / hours / 3600,
                workHours: hours,
                workDaysOfWeek: workDaysOfWeek,
                scheduleType: scheduleType,
                satWorkThisWeek: satWorkThisWeek,
                overtimeSettings: overtimeSettings
            };
            sessionStorage.setItem('wageClockSettings', JSON.stringify(settings));
            window.location.href = 'clock.html?state=auto';
        }

        // Init
        document.getElementById('startTime').addEventListener('change', updatePreview);
        document.getElementById('endTime').addEventListener('change', updatePreview);
        document.getElementById('salary').addEventListener('input', updatePreview);
        updateDots(1);
        updateDayButtons();
    </script>
</body>
</html>
