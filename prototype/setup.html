<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 · 时薪桌面钟</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
canvas { position:fixed;inset:0;z-index:0;pointer-events:none;display:block; }
body {
  background:#08080c;color:#ededef;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
main { position:relative;z-index:1;width:380px;padding:2rem 1.5rem;text-align:center; }
h1 { font-family:'Courier New',monospace;font-size:18px;color:#fff;letter-spacing:2px;margin-bottom:4px; }
.sub { font-size:11px;color:#6b6b75;margin-bottom:24px;letter-spacing:1px; }

/* Steps */
.steps { display:flex;gap:2px;justify-content:center;margin-bottom:24px; }
.steps .dot { width:8px;height:8px;border-radius:50%;background:#1e1e24;transition:0.3s; }
.steps .dot.on { background:#f59e0b; }
.steps .line { width:20px;height:1px;background:#1e1e24;align-self:center;transition:0.3s; }
.steps .line.on { background:#f59e0b; }

/* Step content */
.step { display:none;animation:fadeIn 0.3s ease; }
.step.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }

.step h2 { font-size:14px;font-weight:500;margin-bottom:16px; }
.step h2 .icon { font-size:28px;display:block;margin-bottom:8px; }

/* Inputs */
input[type=number],input[type=time] {
  width:100%;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;color:#fff;font-size:24px;text-align:center;font-family:'Courier New',monospace;
  outline:none;transition:0.2s;
}
input:focus { border-color:rgba(255,255,255,0.35); }
input[type=time]::-webkit-calendar-picker-indicator { filter:invert(1); }

/* Quick selects */
.qs { display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:10px 0; }
.qs button {
  padding:5px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.06);
  background:transparent;color:#6b6b75;font-size:11px;cursor:pointer;font-family:inherit;transition:0.2s;
}
.qs button:hover { border-color:rgba(255,255,255,0.2);color:#a1a1aa; }
.qs button.sel { border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.06);color:#f59e0b; }

/* Day toggles */
.days { display:flex;gap:3px;justify-content:center;margin:10px 0; }
.days button {
  width:36px;height:36px;border-radius:4px;border:1px solid rgba(255,255,255,0.04);
  background:transparent;color:#6b6b75;font-size:11px;cursor:pointer;font-family:inherit;transition:0.2s;
}
.days button.work { background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.25);color:#34d399; }

/* OT section */
.ot-sect { margin-top:16px;padding:14px;border:1px solid rgba(255,255,255,0.04);border-radius:6px;text-align:left; }
.ot-sect h3 { font-size:10px;color:#6b6b75;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;text-align:center; }
.ot-modes { display:flex;gap:3px;justify-content:center;margin-bottom:8px; }
.ot-modes button {
  padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.06);
  background:transparent;color:#6b6b75;font-size:10px;cursor:pointer;font-family:inherit;transition:0.2s;
}
.ot-modes button.sel { border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:#f87171; }
.ot-custom { display:none;margin-top:6px; }
.ot-custom input { font-size:16px;padding:8px;width:100px;text-align:center; }
.ot-custom .unit { display:inline-flex;gap:2px; }
.ot-custom .unit button { font-size:10px;padding:4px 8px; }

/* Buttons */
.btns { display:flex;gap:8px;margin-top:20px; }
.btn {
  flex:1;padding:10px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:0.2s;letter-spacing:1px;
}
.btn.primary { background:transparent;border:1px solid rgba(255,255,255,0.2);color:#d4d4d8; }
.btn.primary:hover { background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.4);color:#fff; }
.btn.secondary { background:transparent;border:1px solid rgba(255,255,255,0.06);color:#6b6b75; }
.btn.secondary:hover { border-color:rgba(255,255,255,0.15);color:#a1a1aa; }
.btn.done { background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.25);color:#34d399; }
.btn.done:hover { background:rgba(52,211,153,0.16); }

.err { font-size:10px;color:#ef4444;min-height:16px;margin-top:6px;text-align:center; }
.preview { margin-top:12px;font-size:10px;color:#6b6b75; }
.preview span { color:#a1a1aa; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<main>
  <h1>SETTINGS</h1>
  <p class="sub">configure your wage clock</p>

  <div class="steps">
    <div class="dot on" id="d1"></div><div class="line" id="l1"></div>
    <div class="dot" id="d2"></div><div class="line" id="l2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <!-- Step 1: Salary -->
  <div class="step active" id="s1">
    <h2><span class="icon">&#128176;</span>Monthly Salary</h2>
    <input type="number" id="salary" value="15000" min="0" step="100">
    <div class="qs">
      <button onclick="setSal(5000)">5k</button><button onclick="setSal(8000)">8k</button>
      <button onclick="setSal(15000)" class="sel">15k</button><button onclick="setSal(25000)">25k</button><button onclick="setSal(40000)">40k</button>
    </div>
    <div class="btns"><button class="btn primary" onclick="next(1)">Next →</button></div>
  </div>

  <!-- Step 2: Schedule -->
  <div class="step" id="s2">
    <h2><span class="icon">&#128197;</span>Work Schedule</h2>
    <div class="qs" style="margin-bottom:12px">
      <button id="scDual" class="sel" onclick="setSched('dual')">5-day (dual rest)</button>
      <button id="scAlt" onclick="setSched('alternating')">5.5-day (alternating)</button>
      <button id="scSingle" onclick="setSched('single')">6-day (single rest)</button>
    </div>
    <p style="font-size:10px;color:#6b6b75;margin-bottom:4px;">tap to toggle rest days</p>
    <div class="days" id="dayToggles">
      <button onclick="tog(0)" data-d="0" class="work">Mon</button>
      <button onclick="tog(1)" data-d="1" class="work">Tue</button>
      <button onclick="tog(2)" data-d="2" class="work">Wed</button>
      <button onclick="tog(3)" data-d="3" class="work">Thu</button>
      <button onclick="tog(4)" data-d="4" class="work">Fri</button>
      <button onclick="tog(5)" data-d="5">Sat</button>
      <button onclick="tog(6)" data-d="6">Sun</button>
    </div>
    <div id="altExtra" style="display:none;margin:8px 0;font-size:10px;color:#6b6b75;">
      This Saturday: <button id="satWork" onclick="setSat(true)" class="sel" style="font-size:10px;padding:3px 8px;">work</button>
      <button id="satRest" onclick="setSat(false)" style="font-size:10px;padding:3px 8px;">rest</button>
    </div>
    <p style="font-size:11px;color:#6b6b75;margin-top:6px;">≈ <span id="wdCount" style="color:#fff;">22</span> days/month</p>
    <div class="btns">
      <button class="btn secondary" onclick="prev(2)">← Back</button>
      <button class="btn primary" onclick="next(2)">Next →</button>
    </div>
  </div>

  <!-- Step 3: Hours + OT -->
  <div class="step" id="s3">
    <h2><span class="icon">&#128338;</span>Work Hours</h2>
    <div style="display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:16px;">
      <div><label style="font-size:9px;color:#6b6b75;display:block;margin-bottom:4px;">Start</label><input type="time" id="startTime" value="09:00" style="font-size:18px;width:120px;"></div>
      <span style="color:#6b6b75;">→</span>
      <div><label style="font-size:9px;color:#6b6b75;display:block;margin-bottom:4px;">End</label><input type="time" id="endTime" value="18:00" style="font-size:18px;width:120px;"></div>
    </div>

    <div class="ot-sect">
      <h3>Overtime Rate</h3>
      <div class="ot-modes">
        <button id="otModeMult" class="sel" onclick="setOTMode('rate')">Multiplier</button>
        <button id="otModeRate" onclick="setOTMode('persecond')">Base Rate</button>
        <button id="otModeCustom" onclick="setOTMode('custom')">Custom</button>
      </div>
      <div id="otMultRow" style="text-align:center;margin-top:6px;">
        <button onclick="setOTMult(1.0)" style="font-size:10px;padding:3px 8px;">1x</button>
        <button onclick="setOTMult(1.5)" class="sel" style="font-size:10px;padding:3px 8px;">1.5x</button>
        <button onclick="setOTMult(2.0)" style="font-size:10px;padding:3px 8px;">2x</button>
        <button onclick="setOTMult(3.0)" style="font-size:10px;padding:3px 8px;">3x</button>
      </div>
      <div class="ot-custom" id="otCustomRow">
        <div style="display:flex;gap:6px;justify-content:center;align-items:center;">
          <input type="number" id="otAmt" value="50" min="0" step="0.01" style="width:80px;">
          <span style="font-size:10px;color:#6b6b75;">¥ /</span>
          <button onclick="togOTUnit()" id="otUnitBtn" style="font-size:10px;padding:4px 8px;">hr</button>
        </div>
      </div>
    </div>

    <div class="preview" id="preview"></div>

    <div class="btns">
      <button class="btn secondary" onclick="prev(3)">← Back</button>
      <button class="btn done" onclick="finish()">Save & Start →</button>
    </div>
  </div>
  <div class="err" id="err"></div>
</main>

<script>
var CU=sessionStorage.getItem('wageClock_currentUser');
if(!CU) location.href='login.html';
function uk(k){return'wageClock_'+CU+'_'+k;}

var step=1,wd=[true,true,true,true,true,false,false],sched='dual',satWork=false;
var ot={mode:'rate',multiplier:1.5,customAmount:50,customUnit:'hour'};

function updDots(s){
  for(var i=1;i<=3;i++)document.getElementById('d'+i).className='dot'+(i<=s?' on':'');
  document.getElementById('l1').className='line'+(s>=2?' on':'');
  document.getElementById('l2').className='line'+(s>=3?' on':'');
}
function showStep(s){
  step=s;updDots(s);
  for(var i=1;i<=3;i++)document.getElementById('s'+i).classList.toggle('active',i===s);
}

function setSal(v){document.getElementById('salary').value=v;}
function tog(d){wd[d]=!wd[d];updateDayBtns();updateWD();}
function updateDayBtns(){
  var btns=document.getElementById('dayToggles').children;
  for(var i=0;i<btns.length;i++)btns[i].className=wd[i]?'work':'';
}
function updateWD(){
  var c=wd.filter(Boolean).length,d=Math.round(c*4.33);
  document.getElementById('wdCount').textContent=d;
}

function setSched(t){
  sched=t;
  document.getElementById('scDual').className=t==='dual'?'sel':'';
  document.getElementById('scAlt').className=t==='alternating'?'sel':'';
  document.getElementById('scSingle').className=t==='single'?'sel':'';
  document.getElementById('altExtra').style.display=t==='alternating'?'block':'none';
  if(t==='dual')wd=[true,true,true,true,true,false,false];
  else if(t==='single')wd=[true,true,true,true,true,true,false];
  else wd=[true,true,true,true,true,satWork,false];
  updateDayBtns();updateWD();
}
function setSat(w){satWork=w;wd[5]=w;updateDayBtns();updateWD();
  document.getElementById('satWork').className=w?'sel':'';document.getElementById('satRest').className=w?'':'sel';}

function setOTMode(m){
  ot.mode=m;
  document.getElementById('otModeMult').className=m==='rate'?'sel':'';
  document.getElementById('otModeRate').className=m==='persecond'?'sel':'';
  document.getElementById('otModeCustom').className=m==='custom'?'sel':'';
  document.getElementById('otMultRow').style.display=m==='rate'?'block':'none';
  document.getElementById('otCustomRow').style.display=m==='custom'?'block':'none';
}
function setOTMult(m){ot.multiplier=m;}
function togOTUnit(){
  ot.customUnit=ot.customUnit==='hour'?'second':(ot.customUnit==='second'?'once':'hour');
  document.getElementById('otUnitBtn').textContent=ot.customUnit==='hour'?'hr':(ot.customUnit==='second'?'sec':'once');
}

function next(f){
  if(f===1){var v=parseFloat(document.getElementById('salary').value);if(!v||v<=0){e('enter valid salary');return;}}
  if(f===2){if(!wd.some(Boolean)){e('select at least one work day');return;}}
  showStep(f+1);if(f===2)updatePrev();
}
function prev(f){showStep(f-1);}
function e(m){document.getElementById('err').textContent=m;setTimeout(function(){document.getElementById('err').textContent='';},2000);}

function updatePrev(){
  var sal=parseFloat(document.getElementById('salary').value)||0;
  var days=Math.round(wd.filter(Boolean).length*4.33);
  var s=document.getElementById('startTime').value,e=document.getElementById('endTime').value;
  if(s&&e){
    var sh=s.split(':').map(Number),eh=e.split(':').map(Number);
    var hrs=eh[0]-sh[0]+(eh[1]-sh[1])/60;
    if(hrs>0){
      var daily=sal/days,perSec=daily/hrs/3600;
      document.getElementById('preview').innerHTML='<span>'+daily.toFixed(2)+'</span> ¥/day · <span>'+perSec.toFixed(4)+'</span> ¥/sec';
    }
  }
}

function finish(){
  var s=document.getElementById('startTime').value,e=document.getElementById('endTime').value;
  if(!s||!e){e('select work hours');return;}
  var sh=s.split(':').map(Number),eh=e.split(':').map(Number);
  if(eh[0]*60+eh[1]<=sh[0]*60+sh[1]){e('end must be after start');return;}
  var sal=parseFloat(document.getElementById('salary').value);
  var days=Math.round(wd.filter(Boolean).length*4.33);
  var hrs=eh[0]-sh[0]+(eh[1]-sh[1])/60;
  var settings={
    monthlySalary:sal,workingDays:days,workStart:s,workEnd:e,
    dailySalary:sal/days,workHours:hrs,perSecondRate:(sal/days)/hrs/3600,
    workDaysOfWeek:wd,scheduleType:sched,satWorkThisWeek:satWork,
    overtimeSettings:ot
  };
  localStorage.setItem(uk('settings'),JSON.stringify(settings));
  location.href='clock.html';
}

document.getElementById('startTime').addEventListener('change',updatePrev);
document.getElementById('endTime').addEventListener('change',updatePrev);
document.getElementById('salary').addEventListener('input',updatePrev);
updDots(1);

// DotGrid
(function(){
  var cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  var DS=3,G=28,P=120,RS=0.08,FR=0.88,W=0,H=0,dots=[];
  var pt={x:-999,y:-999,px:0,py:0,vx:0,vy:0};
  function build(){
    var r=cv.parentNode.getBoundingClientRect();W=r.width;H=r.height;
    var dpr=devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
    var cell=DS+G,cols=Math.floor(W/cell),rows=Math.floor(H/cell);
    var gW=cell*cols,gH=cell*rows,ox=(W-gW)/2+DS/2,oy=(H-gH)/2+DS/2;
    dots=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)dots.push({cx:ox+c*cell,cy:oy+r*cell,x:0,y:0,vx:0,vy:0});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);var psq=P*P;
    for(var i=0;i<dots.length;i++){
      var d=dots[i],ox=d.cx+d.x,oy=d.cy+d.y,dx=d.cx-pt.x,dy=d.cy-pt.y,dsq=dx*dx+dy*dy;
      var a=0.1;if(dsq<psq){var t=1-Math.sqrt(dsq)/P;a=0.1+t*0.45;}
      ctx.beginPath();ctx.arc(ox,oy,DS/2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.fill();
    }
  }
  function upd(){
    pt.vx+=(pt.x-pt.px-pt.vx)*0.3;pt.vy+=(pt.y-pt.py-pt.vy)*0.3;pt.px=pt.x;pt.py=pt.y;
    var spd=Math.hypot(pt.vx,pt.vy);
    for(var i=0;i<dots.length;i++){
      var d=dots[i],dx=d.cx-pt.x,dy=d.cy-pt.y,dist=Math.hypot(dx,dy);
      if(dist<P&&spd>5){var f=(1-dist/P)*spd*0.015;d.vx+=(dx/dist)*f;d.vy+=(dy/dist)*f;}
      d.vx+=(0-d.x)*RS;d.vy+=(0-d.y)*RS;d.vx*=FR;d.vy*=FR;d.x+=d.vx;d.y+=d.vy;
    }
  }
  function tick(){upd();draw();requestAnimationFrame(tick);}
  function mv(e){var r=cv.getBoundingClientRect();pt.x=e.clientX-r.left;pt.y=e.clientY-r.top;}
  function cl(e){var r=cv.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
    for(var i=0;i<dots.length;i++){var d=dots[i],dist=Math.hypot(d.cx-cx,d.cy-cy);
    if(dist<200){var f=(1-dist/200)*12;d.vx+=(d.cx-cx)/dist*f;d.vy+=(d.cy-cy)/dist*f;}}}
  setTimeout(function(){build();requestAnimationFrame(tick);},100);
  window.addEventListener('resize',build);window.addEventListener('mousemove',mv,{passive:true});window.addEventListener('click',cl);
})();
</script>
</body>
</html>
