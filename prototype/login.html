<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 时薪桌面钟</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
canvas { position:fixed;inset:0;z-index:0;pointer-events:none;display:block; }
body {
  background:#08080c;color:#ededef;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
.auth { position:relative;z-index:1;width:320px;padding:2rem;text-align:center; }
.auth h1 { font-family:'Courier New',monospace;font-size:16px;color:#fff;letter-spacing:2px;margin-bottom:8px; }
.auth .sub { font-size:11px;color:#6b6b75;letter-spacing:1px;margin-bottom:28px; }
.row { margin-bottom:12px;text-align:left; }
.row label { display:block;font-size:9px;color:#6b6b75;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px; }
.row input {
  width:100%;padding:9px 10px;background:transparent;border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;color:#ededef;font-size:13px;outline:none;font-family:inherit;
}
.row input:focus { border-color:rgba(255,255,255,0.35); }
.err { font-size:10px;color:#ef4444;text-align:center;min-height:16px;margin-bottom:4px; }
.btn {
  width:100%;padding:9px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;
  background:transparent;border:1px solid rgba(255,255,255,0.2);color:#d4d4d8;
  letter-spacing:1px;transition:0.2s;margin-top:6px;
}
.btn:hover { background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.4);color:#fff; }
.btn.sec { border-color:rgba(255,255,255,0.06);color:#6b6b75; }
.btn.sec:hover { border-color:rgba(255,255,255,0.15);color:#a1a1aa; }
.chips { margin-top:20px; }
.chips label { font-size:9px;color:#3a3a40;letter-spacing:1px;text-transform:uppercase; }
.chip {
  display:inline-block;padding:3px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.06);
  font-size:10px;color:#6b6b75;cursor:pointer;margin:3px;transition:0.2s;
}
.chip:hover { border-color:rgba(255,255,255,0.2);color:#fff; }
.chip .dot { display:inline-block;width:5px;height:5px;border-radius:50%;background:#f59e0b;margin-right:4px; }
.back { margin-top:20px;font-size:10px; }
.back a { color:#3a3a40;text-decoration:none;letter-spacing:1px; }
.back a:hover { color:#6b6b75; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="auth">
  <h1 id="t">SIGN IN</h1>
  <p class="sub" id="sub">continue your session</p>
  <form onsubmit="return handle(event)">
    <div class="row"><label>Username</label><input id="un" placeholder="enter username" required autocomplete="off"></div>
    <div class="row" id="pwRow"><label>Password</label><input id="pw" type="password" placeholder="enter password" autocomplete="off"></div>
    <div class="err" id="er"></div>
    <button class="btn" id="btn">Sign In</button>
  </form>
  <button class="btn sec" id="tgl" onclick="toggle()">Create Account</button>
  <div class="chips" id="chipsWrap" style="display:none"><label>Quick Switch</label><div id="chips"></div></div>
  <div class="back"><a href="hero.html">← back</a></div>
</div>
<script>
var UK='wageClock_users',CK='wageClock_currentUser',reg=false;
function gU(){try{return JSON.parse(localStorage.getItem(UK))||{}}catch(e){return{}}}
function sU(u){localStorage.setItem(UK,JSON.stringify(u));}
function hash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return'h_'+Math.abs(h).toString(36);}
function renderChips(){
  var u=gU(),ids=Object.keys(u),c=document.getElementById('chips'),w=document.getElementById('chipsWrap');
  if(!ids.length){w.style.display='none';return;}
  w.style.display='block';c.innerHTML=ids.map(function(i){return '<span class="chip" onclick="qlogin(\''+i+'\')"><span class="dot"></span>'+u[i].username+'</span>';}).join('');
}
function qlogin(id){sessionStorage.setItem(CK,id);location.href='clock.html';}
function toggle(){
  reg=!reg;document.getElementById('t').textContent=reg?'REGISTER':'SIGN IN';
  document.getElementById('sub').textContent=reg?'create your account':'continue your session';
  document.getElementById('btn').textContent=reg?'Register':'Sign In';
  document.getElementById('tgl').textContent=reg?'Sign In Instead':'Create Account';
  document.getElementById('pwRow').style.display='block';document.getElementById('er').textContent='';
}
function handle(e){
  e.preventDefault();var un=document.getElementById('un').value.trim();
  var pw=document.getElementById('pw').value,er=document.getElementById('er');
  if(!un||un.length<2){er.textContent='username too short';return false;}
  var u=gU();
  if(reg){
    if(!pw||pw.length<3){er.textContent='password too short';return false;}
    if(u[un]){er.textContent='username exists';return false;}
    u[un]={id:un,username:un,passwordHash:hash(pw),createdAt:new Date().toISOString().slice(0,10)};
    sU(u);sessionStorage.setItem(CK,un);location.href='clock.html';
  }else{
    if(u[un]){
      if(pw&&u[un].passwordHash===hash(pw)){sessionStorage.setItem(CK,un);location.href='clock.html';}
      else if(pw){er.textContent='wrong password';}
    }else{
      u[un]={id:un,username:un,passwordHash:pw?hash(pw):'',createdAt:new Date().toISOString().slice(0,10)};
      sU(u);sessionStorage.setItem(CK,un);location.href='clock.html';
    }
  }
  return false;
}
renderChips();
if(sessionStorage.getItem(CK)&&gU()[sessionStorage.getItem(CK)])location.href='clock.html';

// DotGrid
(function(){
  var cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  var S=3,G=28,P=120,R=0.08,F=0.88,W=0,H=0,dots=[];
  var pt={x:-999,y:-999,px:0,py:0,vx:0,vy:0};
  function build(){
    var r=cv.parentNode.getBoundingClientRect();W=r.width;H=r.height;
    var dpr=devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
    var cell=S+G,cols=Math.floor(W/cell),rows=Math.floor(H/cell);
    var gW=cell*cols,gH=cell*rows,ox=(W-gW)/2+S/2,oy=(H-gH)/2+S/2;
    dots=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)dots.push({cx:ox+c*cell,cy:oy+r*cell,x:0,y:0,vx:0,vy:0});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);var psq=P*P;
    for(var i=0;i<dots.length;i++){
      var d=dots[i],ox=d.cx+d.x,oy=d.cy+d.y,dx=d.cx-pt.x,dy=d.cy-pt.y,dsq=dx*dx+dy*dy;
      var a=0.1;if(dsq<psq){var t=1-Math.sqrt(dsq)/P;a=0.1+t*0.45;}
      ctx.beginPath();ctx.arc(ox,oy,S/2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.fill();
    }
  }
  function upd(){
    pt.vx+=(pt.x-pt.px-pt.vx)*0.3;pt.vy+=(pt.y-pt.py-pt.vy)*0.3;pt.px=pt.x;pt.py=pt.y;
    var spd=Math.hypot(pt.vx,pt.vy);
    for(var i=0;i<dots.length;i++){
      var d=dots[i],dx=d.cx-pt.x,dy=d.cy-pt.y,dist=Math.hypot(dx,dy);
      if(dist<P&&spd>5){var f=(1-dist/P)*spd*0.015;d.vx+=(dx/dist)*f;d.vy+=(dy/dist)*f;}
      d.vx+=(0-d.x)*R;d.vy+=(0-d.y)*R;d.vx*=F;d.vy*=F;d.x+=d.vx;d.y+=d.vy;
    }
  }
  function tick(){upd();draw();requestAnimationFrame(tick);}
  function mv(e){var r=cv.getBoundingClientRect();pt.x=e.clientX-r.left;pt.y=e.clientY-r.top;}
  function cl(e){var r=cv.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
    for(var i=0;i<dots.length;i++){var d=dots[i],dist=Math.hypot(d.cx-cx,d.cy-cy);
    if(dist<200){var f=(1-dist/200)*12;d.vx+=(d.cx-cx)/dist*f;d.vy+=(d.cy-cy)/dist*f;}}}
  setTimeout(function(){build();requestAnimationFrame(tick);},100);
  window.addEventListener('resize',build);window.addEventListener('mousemove',mv,{passive:true});window.addEventListener('click',cl);
})();
</script>
</body>
</html>
