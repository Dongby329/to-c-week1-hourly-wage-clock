<!-- 时薪桌面钟 · 原型入口 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时薪桌面钟 · 原型</title>
    <style>
        :root { --bg:#09090b;--surface:#111114;--border:#222228;--text:#e4e4e7;--muted:#71717a;--accent:#f59e0b; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
            -webkit-font-smoothing:antialiased;
        }
        body::before { content:'';position:fixed;inset:0;pointer-events:none;
            background:radial-gradient(ellipse 50% 40% at 50% 40%,rgba(245,158,11,0.03) 0%,transparent 60%); }
        .wrap { position:relative;z-index:1;width:380px;padding:2rem;text-align:center;animation:appear .5s ease; }
        @keyframes appear { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        h1 { font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px; }
        .sub { font-size:13px;color:var(--muted);margin-bottom:32px; }
        .links { display:flex;flex-direction:column;gap:6px; }
        .links a {
            display:flex;align-items:center;gap:10px;padding:12px 16px;
            background:var(--surface);border:1px solid var(--border);border-radius:10px;
            color:var(--text);text-decoration:none;font-size:13px;transition:all .2s;
        }
        .links a:hover { border-color:#52525b;background:#18181b; }
        .links a .ico { font-size:18px;width:24px;text-align:center; }
        .links a .arr { margin-left:auto;color:var(--muted); }
        .note { margin-top:24px;font-size:10px;color:#27272a; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>⏳ 时薪桌面钟</h1>
    <p class="sub">交互原型 v3.0</p>
    <div class="links">
        <a href="hero.html"><span class="ico">✨</span>Hero · 正式入口<span class="arr">→</span></a>
        <a href="login.html"><span class="ico">👤</span>登录 / 注册<span class="arr">→</span></a>
        <a href="clock.html"><span class="ico">⏱</span>时钟（需先登录）<span class="arr">→</span></a>
        <a href="setup.html"><span class="ico">⚙</span>设置向导<span class="arr">→</span></a>
        <a href="calendar.html"><span class="ico">📅</span>收入日历<span class="arr">→</span></a>
    </div>
    <p class="note">直接在文件管理器中双击 .html 文件即可在浏览器中打开</p>
</div>
</body>
</html>
